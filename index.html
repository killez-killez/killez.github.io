<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>killez.io</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #000000;
  --card: #0a0a0a;
  --border: #ff149340;
  --accent: #ff1493;
  --accent2: #ff69b4;
  --accent3: #d81070;
  --text: #f0f0f0;
  --muted: #a0a0a0;
  --btn-bg: #111111;
  --btn-hover: #1c1c1c;
}

html {
  height: 100%;
  overflow: hidden;
}

body {
  font-family: 'Syne', sans-serif;
  background: #000000;
  color: var(--text);
  height: 100vh;
  height: 100dvh;
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 1rem;
  overflow: hidden;
  perspective: 1200px;
}

body.is-desktop,
body.is-desktop a,
body.is-desktop button { cursor: none !important; }

/* Rain Canvas Background */
#rain-canvas {
  position: fixed;
  inset: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  z-index: 0;
  opacity: 0.85;
}

.bg-orb { position: fixed; border-radius: 50%; pointer-events: none; z-index: 0; filter: blur(10px); animation: pulseGlow 3s ease-in-out infinite; }
.orb1 { width: 620px; height: 620px; top: -220px; left: -160px; background: radial-gradient(circle, #ff149315 0%, transparent 68%); animation-delay: 0s; }
.orb2 { width: 520px; height: 520px; bottom: -170px; right: -150px; background: radial-gradient(circle, #ff69b415 0%, transparent 65%); animation-delay: 1s; }
.orb3 { width: 320px; height: 320px; top: 36%; left: 58%; background: radial-gradient(circle, #d8107010 0%, transparent 70%); animation-delay: 2s; }

@keyframes pulseGlow {
  0%, 100% { opacity: 0.4; transform: scale(1); }
  50% { opacity: 0.6; transform: scale(1.08); }
}

#enter-screen {
  position: fixed; inset: 0; z-index: 100;
  background: radial-gradient(circle at center, #0a0a0a 0%, #000000 100%);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 1.5rem;
  transition: opacity 0.8s ease, visibility 0.8s ease;
}
#enter-screen.hidden { opacity: 0; visibility: hidden; }

.enter-logo {
  font-family: 'Syne', sans-serif;
  font-size: 4rem; font-weight: 800; letter-spacing: 0.08em;
  background: linear-gradient(135deg, #ff1493, #ff69b4, #ff99cc, #ff1493);
  background-size: 300% 300%;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  animation: epulse 2s ease-in-out infinite, gradientShift 3s ease infinite;
}
@keyframes gradientShift {
  0%, 100% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
}
@keyframes epulse {
  0%, 100% { transform: translateY(0); filter: drop-shadow(0 0 10px #ff149366); }
  50% { transform: translateY(-4px); filter: drop-shadow(0 0 25px #ff1493cc); }
}

.enter-btn {
  background: linear-gradient(135deg, #111111, #1a1a1a);
  border: 2px solid #ff1493;
  border-radius: 99px;
  padding: 14px 44px;
  color: var(--text);
  font-family: 'Syne', sans-serif;
  font-weight: 700;
  font-size: 1rem;
  letter-spacing: 0.1em;
  transition: all 0.3s;
  cursor: pointer;
}
.enter-btn:hover {
  border-color: #ff69b4;
  transform: scale(1.05);
  box-shadow: 0 0 28px #ff149350;
  background: linear-gradient(135deg, #1c1c1c, #242424);
}

.enter-sub {
  font-family: 'DM Mono', monospace;
  font-size: 0.7rem;
  color: #ff69b4;
  letter-spacing: 0.1em;
  animation: blink 1.5s step-end infinite, textGlow 2s ease-in-out infinite;
}
@keyframes textGlow {
  0%, 100% { text-shadow: 0 0 5px #ff1493; }
  50% { text-shadow: 0 0 12px #ff69b4; }
}
@keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

#tilt-wrapper {
  position: relative; z-index: 1;
  width: 100%; max-width: 580px;
  transform-style: preserve-3d;
  transform: rotateX(0deg) rotateY(0deg);
  transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1);
  opacity: 0;
}
#tilt-wrapper.visible {
  opacity: 1;
  transition: opacity 0.8s ease, transform 0.6s cubic-bezier(0.23, 1, 0.32, 1);
}
#tilt-wrapper.tilting { transition: transform 0.08s linear; }

.card {
  background:
    linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0) 22%),
    linear-gradient(160deg, #0f0f0f 0%, #0a0a0a 46%, #050505 100%);
  border: 1px solid #ff149328;
  border-radius: 32px;
  padding: 2.4rem 2.6rem;
  text-align: center;
  position: relative;
  transform-style: preserve-3d;
  box-shadow: 0 24px 70px #00000090, 0 0 0 1px #ff149315 inset;
  transition: box-shadow 0.4s ease;
  overflow: visible;
}

@media (max-width: 480px) {
  .card { padding: 1.5rem 1.2rem; border-radius: 24px; }
  .avatar { width: 80px; height: 80px; }
  .username { font-size: 1.4rem; }
  .sp-art { width: 36px; height: 36px; }
  .icon-btn { width: 52px; height: 52px; }
}

.card.glow {
  box-shadow: 0 0 55px #ff149324, 0 0 100px #ff69b41a, 0 20px 70px #00000080;
}

.card-depth { position: absolute; inset: 0; border-radius: 32px; transform: translateZ(-8px) scale(1.02); border: 1px solid #ff149316; pointer-events: none; }
.card-depth2 { position: absolute; inset: 0; border-radius: 32px; transform: translateZ(-16px) scale(1.04); border: 1px solid #ff99cc12; pointer-events: none; }

.volume-ctrl {
  position: fixed;
  top: 20px; right: 24px;
  display: flex; align-items: center; gap: 7px;
  z-index: 200;
  background: #0a0a0ad9;
  border: 1px solid #ff69b440;
  border-radius: 99px;
  padding: 7px 14px;
  backdrop-filter: blur(12px);
}
@media (max-width: 480px) {
  .volume-ctrl { top: 12px; right: 12px; padding: 5px 10px; }
}

.vol-icon svg { display: block; }
.vol-slider {
  -webkit-appearance: none;
  appearance: none;
  width: 72px; height: 3px;
  border-radius: 99px;
  background: linear-gradient(to right, #ff1493 var(--val, 80%), #ffffff18 var(--val, 80%));
  outline: none;
}
.vol-slider::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 14px; height: 14px;
  border-radius: 50%;
  background: #ff1493;
  box-shadow: 0 0 8px #ff149370;
}

/* ENHANCED AVATAR SECTION */
.avatar-section {
  position: relative;
  display: flex;
  justify-content: center;
  margin-bottom: 1.2rem;
  transform: translateZ(25px);
}
.avatar-wrapper {
  position: relative;
  width: fit-content;
}
.avatar-frame {
  position: absolute;
  inset: -4px;
  border-radius: 50%;
  background: linear-gradient(135deg, #ff1493, #ff69b4, #ff99cc);
  opacity: 0.8;
  filter: blur(2px);
  animation: framePulse 2s ease-in-out infinite;
}
@keyframes framePulse {
  0%, 100% { opacity: 0.6; transform: scale(1); }
  50% { opacity: 1; transform: scale(1.02); }
}
.avatar {
  position: relative;
  width: 96px;
  height: 96px;
  border-radius: 50%;
  object-fit: cover;
  border: 3px solid #ff1493;
  box-shadow: 0 0 30px #ff149380, inset 0 0 20px rgba(255,20,147,0.3);
  transition: all 0.3s ease;
  background: linear-gradient(135deg, #2a0f1f, #1a0a1a);
}
.avatar:hover {
  transform: scale(1.02);
  box-shadow: 0 0 45px #ff1493cc;
}
.avatar-glow-ring {
  position: absolute;
  top: 50%;
  left: 50%;
  width: 110%;
  height: 110%;
  transform: translate(-50%, -50%);
  border-radius: 50%;
  background: radial-gradient(circle, rgba(255,20,147,0.2) 0%, transparent 70%);
  pointer-events: none;
  animation: ringRotate 4s linear infinite;
}
@keyframes ringRotate {
  0% { transform: translate(-50%, -50%) rotate(0deg); }
  100% { transform: translate(-50%, -50%) rotate(360deg); }
}
.status-dot {
  position: absolute;
  bottom: 6px;
  right: 6px;
  width: 18px;
  height: 18px;
  border-radius: 50%;
  background: linear-gradient(135deg, #ff69b4, #ff1493);
  border: 2px solid #0a0a0a;
  box-shadow: 0 0 15px #ff1493;
  animation: statusPulse 1.5s ease-in-out infinite;
  z-index: 2;
}
@keyframes statusPulse {
  0%, 100% { transform: scale(1); box-shadow: 0 0 8px #ff1493; }
  50% { transform: scale(1.15); box-shadow: 0 0 20px #ff69b4; }
}
.avatar-decor {
  position: absolute;
  top: -15px;
  right: -15px;
  font-size: 1.8rem;
  filter: drop-shadow(0 0 5px #ff1493);
  animation: floatDecor 3s ease-in-out infinite;
}
@keyframes floatDecor {
  0%, 100% { transform: translateY(0px) rotate(0deg); }
  50% { transform: translateY(-5px) rotate(5deg); }
}
@media (max-width: 480px) {
  .avatar { width: 80px; height: 80px; }
  .avatar-decor { font-size: 1.4rem; top: -12px; right: -12px; }
  .status-dot { width: 16px; height: 16px; bottom: 4px; right: 4px; }
}

.username {
  font-size: 1.8rem; font-weight: 800;
  background: linear-gradient(135deg, #ff1493, #ff69b4, #ff99cc);
  background-size: 200% 200%;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-bottom: 0.25rem;
  animation: usernameGradient 3s ease infinite;
}
@keyframes usernameGradient {
  0%, 100% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
}
.username .name-cursor {
  display: inline-block; width: 2px; height: 1em;
  background: #ff1493;
  margin-left: 2px; vertical-align: middle;
  animation: blink 0.8s step-end infinite;
}

.handle { font-family: 'DM Mono', monospace; font-size: 0.75rem; color: var(--muted); margin-bottom: 0.9rem; }

.bio {
  font-size: 1rem; font-weight: 600; line-height: 1.6;
  margin-bottom: 1.2rem;
  background: linear-gradient(90deg, #ff1493, #ff69b4, #ff99cc, #ff1493);
  background-size: 220% auto;
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
  animation: gradshift 4s linear infinite;
}
@keyframes gradshift {
  0% { background-position: 0% center; }
  100% { background-position: 220% center; }
}
.bio .cursor {
  display: inline-block; width: 2px; height: 1em;
  background: #ff1493 !important;
  margin-left: 2px; vertical-align: middle;
  animation: blink 0.8s step-end infinite;
  -webkit-text-fill-color: initial;
}

.badges { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; margin-bottom: 1.2rem; }
.badge {
  font-family: 'DM Mono', monospace; font-size: 0.65rem;
  padding: 4px 12px; border-radius: 99px;
  border: 1px solid #ff69b428; color: var(--muted); background: var(--btn-bg);
  transition: all 0.3s;
}
.badge:hover {
  border-color: #ff1493;
  transform: scale(1.03);
  box-shadow: 0 0 8px #ff149340;
}
.badge.special {
  border-color: #ff99cc40; color: #ffb8d8;
  background: linear-gradient(135deg, #ff149310, #ff69b40d);
}

.divider { height: 1px; background: linear-gradient(90deg, transparent, #ff69b435, transparent); margin: 1rem 0; }

.spotify-bar {
  background: #050505;
  border: 1px solid #ff69b432;
  border-radius: 18px; padding: 12px 14px; margin-bottom: 1rem;
  display: flex; align-items: center; gap: 12px;
  position: relative;
  overflow: hidden;
}
.spotify-bar::before {
  content: "";
  position: absolute;
  inset: -2px;
  background: linear-gradient(45deg, #ff1493, #ff69b4, #ff1493);
  border-radius: 19px;
  opacity: 0;
  z-index: -1;
  transition: opacity 0.3s;
}
.spotify-bar:hover::before { opacity: 0.25; }

.sp-art {
  width: 44px; height: 44px; border-radius: 12px;
  background: linear-gradient(135deg, #1a1a1a, #111111);
  border: 1px solid #ff69b422;
  display: flex; align-items: center; justify-content: center;
  font-size: 20px;
  overflow: hidden;
}
.sp-art img {
  width: 100%; height: 100%; object-fit: cover;
  border-radius: 12px; display: none;
}
.sp-art img.loaded { display: block; }
.sp-art img.loaded + .sp-art-emoji { display: none; }

.sp-info { flex: 1; text-align: left; overflow: hidden; }
.sp-title { font-size: 0.85rem; font-weight: 700; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.sp-artist { font-family: 'DM Mono', monospace; font-size: 0.68rem; color: var(--muted); }
.sp-label { font-family: 'DM Mono', monospace; font-size: 0.6rem; color: #ff69b4; margin-bottom: 3px; display: flex; align-items: center; gap: 5px; }
.sp-dot { width: 5px; height: 5px; border-radius: 50%; background: #ff1493; animation: spdot 1.5s ease infinite; }
@keyframes spdot { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; transform: scale(0.6); } }

.sp-progress-wrap {
  margin-top: 8px;
  display: flex; align-items: center; gap: 6px;
}
.sp-time {
  font-family: 'DM Mono', monospace;
  font-size: 0.55rem; color: var(--muted);
  width: 28px;
}
.sp-progress {
  flex: 1; height: 5px; background: #ffffff15;
  border-radius: 99px; position: relative;
  cursor: pointer;
}
.sp-progress-inner {
  position: relative; width: 100%; height: 100%;
  border-radius: 99px; overflow: hidden;
}
.sp-fill {
  height: 100%;
  background: linear-gradient(90deg, #ff1493, #ff69b4);
  width: 0%;
  transition: width 0.3s linear;
}
.sp-thumb {
  position: absolute; top: 50%; right: -6px;
  width: 11px; height: 11px; border-radius: 50%;
  background: #ff99cc;
  transform: translateY(-50%) scale(0);
  transition: transform 0.15s ease;
  pointer-events: none;
}
.sp-progress:hover .sp-thumb,
.sp-progress.dragging .sp-thumb { transform: translateY(-50%) scale(1); }

.sp-controls { display: flex; align-items: center; gap: 8px; }
.sp-btn {
  background: transparent; border: none;
  color: var(--muted);
  padding: 5px;
  transition: color 0.2s, transform 0.15s;
  cursor: pointer;
}
.sp-btn:hover { color: var(--text); transform: scale(1.12); }
.sp-btn.play {
  width: 36px; height: 36px; border-radius: 50%;
  background: linear-gradient(135deg, #ff1493, #ff69b4);
  color: #fff;
  padding: 0;
  animation: buttonPulse 2s ease-in-out infinite;
}
@keyframes buttonPulse {
  0%, 100% { box-shadow: 0 0 0 0 rgba(255, 20, 147, 0.6); }
  50% { box-shadow: 0 0 0 8px rgba(255, 20, 147, 0); }
}
.sp-btn.play:hover { background: linear-gradient(135deg, #ff69b4, #ff99cc); transform: scale(1.08); }

.links {
  display: flex;
  justify-content: center;
  gap: 16px;
  padding-top: 8px;
}
.icon-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 56px;
  height: 56px;
  border-radius: 18px;
  background: var(--btn-bg);
  border: 1px solid #ff69b422;
  color: var(--muted);
  text-decoration: none;
  transition: all 0.3s;
}
.icon-btn svg {
  width: 26px;
  height: 26px;
  display: block;
  fill: currentColor;
}
.icon-btn:hover {
  background: var(--btn-hover);
  border-color: #ff69b466;
  transform: translateY(-3px) scale(1.05);
  box-shadow: 0 6px 20px #ff149325;
}
.discord-btn:hover { color: #5865F2; }
.spotify-btn:hover { color: #1DB954; }

.views {
  font-family: 'DM Mono', monospace;
  font-size: 0.65rem;
  color: var(--muted);
  margin-top: 1rem;
  opacity: 0.4;
  letter-spacing: 1px;
}

/* Cursor */
#cursor-dot, #cursor-ring { display: none; }
body.is-desktop #cursor-dot,
body.is-desktop #cursor-ring { display: block; }
#cursor-dot {
  position: fixed; width: 8px; height: 8px; border-radius: 50%;
  background: #ff1493; pointer-events: none; z-index: 99999;
  transform: translate(-50%, -50%);
  box-shadow: 0 0 12px #ff1493;
}
#cursor-ring {
  position: fixed; width: 34px; height: 34px; border-radius: 50%;
  border: 1.5px solid #ff69b480; pointer-events: none; z-index: 99998;
  transform: translate(-50%, -50%);
  transition: width 0.2s, height 0.2s;
}
.trail-dot {
  position: fixed; border-radius: 50%;
  pointer-events: none; z-index: 99990;
  transform: translate(-50%, -50%);
  display: none;
}
body.is-desktop .trail-dot { display: block; }

.spark {
  position: fixed; pointer-events: none;
  z-index: 99995; width: 5px; height: 5px; border-radius: 50%;
  animation: spark-fly 0.6s ease forwards;
}
@keyframes spark-fly {
  0% { opacity: 1; transform: translate(0,0) scale(1); }
  100% { opacity: 0; transform: var(--tx) scale(0); }
}
</style>
</head>
<body>

<canvas id="rain-canvas"></canvas>

<div id="cursor-dot"></div>
<div id="cursor-ring"></div>

<div class="bg-orb orb1"></div>
<div class="bg-orb orb2"></div>
<div class="bg-orb orb3"></div>

<div id="enter-screen">
  <div class="enter-logo">KILLEZ</div>
  <button class="enter-btn" id="enter-btn">ENTER</button>
  <p class="enter-sub"></p>
</div>

<div class="volume-ctrl">
  <span class="vol-icon" id="vol-icon">
    <svg id="vol-svg" width="16" height="16" viewBox="0 0 24 24" fill="white">
      <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>
    </svg>
  </span>
  <input type="range" class="vol-slider" id="vol-slider" min="0" max="100" value="80" style="--val: 80%;"/>
</div>

<div id="tilt-wrapper">
  <div class="card" id="card">
    <div class="card-depth"></div>
    <div class="card-depth2"></div>

    <!-- ENHANCED AVATAR SECTION -->
    <div class="avatar-section">
      <div class="avatar-wrapper">
        <div class="avatar-frame"></div>
        <div class="avatar-glow-ring"></div>
        <img src="assets/avatar.png" class="avatar" alt="avatar" id="avatar-img"/>
        <div class="status-dot"></div>
        <div class="avatar-decor">✨</div>
      </div>
    </div>

    <span class="username" id="username"><span class="name-cursor"></span></span>
    <p class="handle">@killez</p>
    <p class="bio" id="bio"><span class="cursor"></span></p>

    <div class="badges">
      <span class="badge">DARK SKID</span>
      <span class="badge special">PINK NOIR</span>
      <span class="badge">MIDNIGHT</span>
    </div>

    <div class="divider"></div>

    <div class="spotify-bar">
      <div class="sp-art" id="sp-art">
        <img id="sp-art-img" src="" alt=""/>
        <span class="sp-art-emoji" id="sp-art-emoji">🎧</span>
      </div>
      <div class="sp-info">
        <div class="sp-label"><span class="sp-dot"></span><span id="sp-status">dark ambient</span></div>
        <div class="sp-title" id="sp-title">your song title</div>
        <div class="sp-artist" id="sp-artist">artist name</div>
        <div class="sp-progress-wrap">
          <span class="sp-time" id="sp-time-cur">0:00</span>
          <div class="sp-progress" id="sp-progress">
            <div class="sp-progress-inner">
              <div class="sp-fill" id="sp-fill"></div>
            </div>
            <div class="sp-thumb" id="sp-thumb"></div>
          </div>
          <span class="sp-time right" id="sp-time-dur">0:00</span>
        </div>
      </div>
      <div class="sp-controls">
        <button class="sp-btn" id="sp-prev">
          <svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg>
        </button>
        <button class="sp-btn play" id="sp-play">
          <svg id="play-icon" viewBox="0 0 24 24" fill="currentColor" width="16" height="16"><path d="M8 5v14l11-7z"/></svg>
        </button>
        <button class="sp-btn" id="sp-next">
          <svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
        </button>
      </div>
    </div>

    <div class="links">
      <a class="icon-btn discord-btn" id="discord-btn" href="https://discord.com/users/717700366501806130" target="_blank">
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057c.003.025.015.05.031.066a19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028c.462-.63.874-1.295 1.226-1.994a.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03z"/>

      <a class="icon-btn spotify-btn" id="spotify-btn" href="https://open.spotify.com/user/example" target="_blank">
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.1-10.56-1.14-.42.12-.78-.18-.9-.6-.12-.42.18-.78.6-.9 4.56-1.02 8.46-.6 11.64 1.32.36.18.48.66.24 1.02zm1.44-3.3c-.3.42-.78.6-1.2.3-3.24-2.04-8.16-2.64-11.94-1.44-.48.12-1.02-.18-1.14-.66-.12-.48.18-1.02.66-1.14 4.26-1.32 9.54-.66 13.2 1.56.42.24.6.78.36 1.2zm.12-3.36c-3.9-2.34-10.2-2.58-13.86-1.44-.54.18-1.08-.12-1.26-.66-.18-.54.12-1.08.66-1.26 4.26-1.32 11.1-1.08 15.54 1.56.48.3.66.9.36 1.38-.3.42-.9.6-1.44.42z"/>

    <p class="views">KILLEZ.IO | DARK RAIN</p>
  </div>
</div>

<audio id="audio" loop></audio>

<script>
// Enhanced Rain Effect with pink droplets
const canvas = document.getElementById('rain-canvas');
const ctx = canvas.getContext('2d');
let width, height;
let raindrops = [];
const RAIN_COUNT = 200;

function resizeCanvas() {
  width = canvas.width = window.innerWidth;
  height = canvas.height = window.innerHeight;
}

function initRain() {
  for (let i = 0; i < RAIN_COUNT; i++) {
    raindrops.push({
      x: Math.random() * width,
      y: Math.random() * height,
      length: Math.random() * 22 + 8,
      speed: Math.random() * 9 + 4,
      opacity: Math.random() * 0.5 + 0.2,
      hue: 320 + Math.random() * 20
    });
  }
}

function drawRain() {
  ctx.clearRect(0, 0, width, height);
  for (let drop of raindrops) {
    ctx.beginPath();
    ctx.moveTo(drop.x, drop.y);
    ctx.lineTo(drop.x, drop.y + drop.length);
    ctx.strokeStyle = `hsla(${drop.hue}, 85%, 65%, ${drop.opacity})`;
    ctx.lineWidth = 1.8;
    ctx.stroke();
    drop.y += drop.speed;
    if (drop.y > height) {
      drop.y = -drop.length;
      drop.x = Math.random() * width;
      drop.hue = 320 + Math.random() * 20;
    }
  }
  requestAnimationFrame(drawRain);
}

window.addEventListener('resize', () => {
  resizeCanvas();
  raindrops = [];
  initRain();
});
resizeCanvas();
initRain();
drawRain();

// MUSIC PLAYER LOGIC
const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
document.body.classList.add(isMobile ? 'is-mobile' : 'is-desktop');

const TRACKS = [
  { title: 'DARK PULSE', artist: 'nocturne', src: 'assets/fighter.mp3', img: 'assets/covers/song1.jpg', emoji: '🎧' },
  { title: 'MIDNIGHT SHIFT', artist: 'echo', src: 'assets/songs/song.mp3', img: 'assets/covers/song.jpg', emoji: '🖤' }
];
const BIO_PHRASES = ['GT', 'ARMY OF 2', 'KYS', 'IDK'];

function fmtTime(s) {
  if (!isFinite(s) || isNaN(s)) return '0:00';
  const m = Math.floor(s / 60), sec = Math.floor(s % 60);
  return `${m}:${sec.toString().padStart(2, '0')}`;
}

let current = 0, playing = false, progTimer = null;
const audio = document.getElementById('audio');
const spPlay = document.getElementById('sp-play');
const playIcon = document.getElementById('play-icon');
const card = document.getElementById('card');
const wrapper = document.getElementById('tilt-wrapper');
const spFill = document.getElementById('sp-fill');
const spProg = document.getElementById('sp-progress');
const spCurEl = document.getElementById('sp-time-cur');
const spDurEl = document.getElementById('sp-time-dur');
const spArtImg = document.getElementById('sp-art-img');
const spArtEmoji = document.getElementById('sp-art-emoji');

const PLAY_PATH = '<path d="M8 5v14l11-7z"/>';
const PAUSE_PATH = '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>';

const volSlider = document.getElementById('vol-slider');
audio.volume = 0.8;
volSlider.addEventListener('input', () => {
  audio.volume = volSlider.value / 100;
  volSlider.style.setProperty('--val', volSlider.value + '%');
});

function loadTrack(i) {
  const t = TRACKS[i];
  document.getElementById('sp-title').textContent = t.title;
  document.getElementById('sp-artist').textContent = t.artist;
  audio.src = t.src;
  spFill.style.width = '0%';
  spCurEl.textContent = '0:00';
  spDurEl.textContent = '0:00';
  if (t.img) {
    spArtImg.src = t.img;
    spArtImg.onload = () => spArtImg.classList.add('loaded');
    spArtImg.onerror = () => { spArtImg.classList.remove('loaded'); spArtEmoji.textContent = t.emoji; };
    spArtImg.classList.remove('loaded');
  } else {
    spArtImg.classList.remove('loaded');
    spArtEmoji.textContent = t.emoji;
  }
}

audio.addEventListener('loadedmetadata', () => { spDurEl.textContent = fmtTime(audio.duration); });

function setPlaying(s) {
  playing = s;
  playIcon.innerHTML = s ? PAUSE_PATH : PLAY_PATH;
  document.getElementById('sp-status').textContent = s ? 'NOW PLAYING' : 'PAUSED';
  if (s) { startProg(); card.classList.add('glow'); }
  else { clearInterval(progTimer); card.classList.remove('glow'); }
}

function startProg() {
  clearInterval(progTimer);
  progTimer = setInterval(() => {
    if (!isDragging && audio.duration) {
      const pct = audio.currentTime / audio.duration * 100;
      spFill.style.width = pct + '%';
      spCurEl.textContent = fmtTime(audio.currentTime);
      spDurEl.textContent = fmtTime(audio.duration);
    }
  }, 250);
}

spPlay.addEventListener('click', () => {
  playing ? audio.pause() : audio.play().catch(() => {});
  setPlaying(!playing);
});
document.getElementById('sp-prev').addEventListener('click', () => {
  current = (current - 1 + TRACKS.length) % TRACKS.length;
  loadTrack(current);
  if (playing) audio.play().catch(() => {});
});
document.getElementById('sp-next').addEventListener('click', () => {
  current = (current + 1) % TRACKS.length;
  loadTrack(current);
  if (playing) audio.play().catch(() => {});
});
loadTrack(0);

let isDragging = false;
function seekTo(clientX) {
  const rect = spProg.getBoundingClientRect();
  let pct = (clientX - rect.left) / rect.width;
  pct = Math.max(0, Math.min(1, pct));
  if (audio.duration) {
    audio.currentTime = pct * audio.duration;
    spFill.style.width = (pct * 100) + '%';
    spCurEl.textContent = fmtTime(audio.currentTime);
  }
}
spProg.addEventListener('mousedown', (e) => { isDragging = true; spProg.classList.add('dragging'); seekTo(e.clientX); });
window.addEventListener('mousemove', (e) => { if (isDragging) seekTo(e.clientX); });
window.addEventListener('mouseup', () => { isDragging = false; spProg.classList.remove('dragging'); });
spProg.addEventListener('touchstart', (e) => { isDragging = true; spProg.classList.add('dragging'); seekTo(e.touches[0].clientX); e.preventDefault(); }, { passive: false });
window.addEventListener('touchmove', (e) => { if (isDragging) { seekTo(e.touches[0].clientX); e.preventDefault(); } }, { passive: false });
window.addEventListener('touchend', () => { isDragging = false; spProg.classList.remove('dragging'); });

// Typing animations
const usernameEl = document.getElementById('username');
const NAME = 'killez';
function typeUsername() {
  const cursor = usernameEl.querySelector('.name-cursor') || (() => { const c = document.createElement('span'); c.className = 'name-cursor'; return c; })();
  let i = 0;
  function typeIn() {
    if (i <= NAME.length) { usernameEl.textContent = NAME.slice(0, i); usernameEl.appendChild(cursor); i++; setTimeout(typeIn, 110); }
    else setTimeout(deleteOut, 1600);
  }
  function deleteOut() {
    const cur = usernameEl.textContent.replace('|', '').length;
    if (cur > 0) { usernameEl.textContent = NAME.slice(0, cur - 1); usernameEl.appendChild(cursor); setTimeout(deleteOut, 60); }
    else { i = 0; setTimeout(typeIn, 400); }
  }
  typeIn();
}

const bioEl = document.getElementById('bio');
let phraseIndex = 0;
const bioText = document.createElement('span');
bioText.id = 'bio-text';
bioEl.insertBefore(bioText, bioEl.querySelector('.cursor'));
function typeBio() {
  const line = BIO_PHRASES[phraseIndex];
  if (bioText.textContent.length < line.length) { bioText.textContent += line[bioText.textContent.length]; setTimeout(typeBio, 55); }
  else setTimeout(deleteBio, 1800);
}
function deleteBio() {
  if (bioText.textContent.length > 0) { bioText.textContent = bioText.textContent.slice(0, -1); setTimeout(deleteBio, 30); }
  else { phraseIndex = (phraseIndex + 1) % BIO_PHRASES.length; setTimeout(typeBio, 400); }
}

document.getElementById('enter-btn').addEventListener('click', () => {
  const es = document.getElementById('enter-screen');
  es.classList.add('hidden');
  setTimeout(() => {
    es.style.display = 'none';
    wrapper.classList.add('visible');
    typeUsername();
    setTimeout(typeBio, 700);
    audio.play().catch(() => {});
    setPlaying(true);
  }, 800);
});

// Tilt effect
const MAX_TILT = 16;
let isHovering = false;
function applyTilt(rx, ry) {
  wrapper.style.transform = `rotateX(${rx}deg) rotateY(${ry}deg)`;
}
function resetTilt() {
  wrapper.classList.remove('tilting');
  wrapper.style.transform = 'rotateX(0deg) rotateY(0deg)';
}
if (!isMobile) {
  wrapper.addEventListener('mouseenter', () => { isHovering = true; wrapper.classList.add('tilting'); });
  wrapper.addEventListener('mouseleave', () => { isHovering = false; resetTilt(); });
  wrapper.addEventListener('mousemove', (e) => {
    if (!isHovering) return;
    const rect = wrapper.getBoundingClientRect();
    const dx = (e.clientX - rect.left) / rect.width - 0.5;
    const dy = (e.clientY - rect.top) / rect.height - 0.5;
    applyTilt(-dy * MAX_TILT * 2, dx * MAX_TILT * 2);
  });
}

// Sparks on click
function spawnSparks(cx, cy) {
  for (let i = 0; i < 12; i++) {
    const s = document.createElement('div');
    s.className = 'spark';
    const angle = Math.random() * Math.PI * 2;
    const dist = 20 + Math.random() * 50;
    s.style.left = cx + 'px';
    s.style.top = cy + 'px';
    s.style.setProperty('--tx', `translate(${Math.cos(angle) * dist}px, ${Math.sin(angle) * dist}px)`);
    s.style.background = `hsl(${320 + Math.random() * 30}, 85%, 65%)`;
    document.body.appendChild(s);
    setTimeout(() => s.remove(), 600);
  }
}
document.addEventListener('click', (e) => spawnSparks(e.clientX, e.clientY));

// Custom cursor for desktop
if (!isMobile) {
  const dot = document.getElementById('cursor-dot');
  const ring = document.getElementById('cursor-ring');
  let mx = window.innerWidth / 2, my = window.innerHeight / 2;
  let rx = mx, ry = my;
  document.addEventListener('mousemove', (e) => {
    mx = e.clientX; my = e.clientY;
    dot.style.left = mx + 'px';
    dot.style.top = my + 'px';
  });
  function animateRing() {
    rx += (mx - rx) * 0.15;
    ry += (my - ry) * 0.15;
    ring.style.left = rx + 'px';
    ring.style.top = ry + 'px';
    requestAnimationFrame(animateRing);
  }
  animateRing();
  document.querySelectorAll('a, button, .icon-btn, .sp-progress, .vol-slider').forEach(el => {
    el.addEventListener('mouseenter', () => {
      dot.style.width = '5px';
      dot.style.height = '5px';
      ring.style.width = '48px';
      ring.style.height = '48px';
      ring.style.borderColor = '#ff69b4';
    });
    el.addEventListener('mouseleave', () => {
      dot.style.width = '8px';
      dot.style.height = '8px';
      ring.style.width = '34px';
      ring.style.height = '34px';
      ring.style.borderColor = '#ff69b480';
    });
  });
}

// Avatar image fallback
const avatarImg = document.getElementById('avatar-img');
avatarImg.onerror = () => {
  avatarImg.src = 'https://via.placeholder.com/96x96/ff1493/ffffff?text=K';
};
</script>
</body>
