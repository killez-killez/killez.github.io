<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>killez.io</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #0a0a0f;
  --card: #0f0f1a;
  --border: #a855f720;
  --accent: #a855f7;
  --accent2: #c084fc;
  --text: #f3e8ff;
  --muted: #a78bfa;
  --btn-bg: #1a1a2e;
  --btn-hover: #2a1a3e;
}

html {
  height: 100%;
  overflow: hidden;
}

body {
  font-family: 'Syne', sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  height: 100dvh;
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 1rem;
  overflow: hidden;
  perspective: 1200px;
}

/* Desktop gets custom cursor; mobile does not */
body.is-desktop,
body.is-desktop a,
body.is-desktop button { cursor: none !important; }

/* RAIN CANVAS */
#rain-canvas {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;
  z-index: 0;
  opacity: 0.6;
}

.bg-orb { position: fixed; border-radius: 50%; pointer-events: none; z-index: 0; }
.orb1 { width: 600px; height: 600px; top: -200px; left: -180px; background: radial-gradient(circle, #a855f730 0%, transparent 65%); }
.orb2 { width: 500px; height: 500px; bottom: -150px; right: -150px; background: radial-gradient(circle, #7c3aed30 0%, transparent 65%); }
.orb3 { width: 300px; height: 300px; top: 40%; left: 60%; background: radial-gradient(circle, #c084fc15 0%, transparent 70%); }

/* ENTER SCREEN */
#enter-screen {
  position: fixed; inset: 0; z-index: 100;
  background: #0a0a0f;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 2rem;
  transition: opacity 0.8s ease, visibility 0.8s ease;
}
#enter-screen.hidden { opacity: 0; visibility: hidden; }

.enter-logo {
  font-size: 3rem; font-weight: 800;
  background: linear-gradient(135deg, #a855f7, #c084fc, #7c3aed);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
  animation: epulse 2s ease-in-out infinite;
}
@keyframes epulse {
  0%, 100% { filter: drop-shadow(0 0 10px #a855f760); }
  50%       { filter: drop-shadow(0 0 32px #a855f7cc); }
}

.enter-btn {
  background: transparent;
  border: 1px solid #a855f750;
  border-radius: 99px;
  padding: 14px 44px;
  color: var(--text);
  font-family: 'Syne', sans-serif;
  font-size: 0.9rem;
  letter-spacing: 0.15em;
  transition: border-color 0.3s, transform 0.2s, box-shadow 0.3s;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
}
.enter-btn:hover, .enter-btn:active {
  border-color: #a855f7;
  transform: scale(1.05);
  box-shadow: 0 0 28px #a855f730;
}

.enter-sub {
  font-family: 'DM Mono', monospace;
  font-size: 0.7rem;
  color: var(--muted);
  letter-spacing: 0.1em;
  animation: blink 1.5s step-end infinite;
}
@keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

/* 3D WRAPPER */
#tilt-wrapper {
  position: relative; z-index: 1;
  width: 100%; max-width: 600px;
  transform-style: preserve-3d;
  transform: rotateX(0deg) rotateY(0deg);
  transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1);
  opacity: 0;
}
#tilt-wrapper.visible {
  opacity: 1;
  transition: opacity 0.8s ease, transform 0.6s cubic-bezier(0.23, 1, 0.32, 1);
}
#tilt-wrapper.tilting { transition: transform 0.08s linear; }

/* CARD */
.card {
  background: linear-gradient(160deg, #1a1a2e 0%, #0f0f1a 50%, #0a0a0f 100%);
  border: 1px solid #a855f720;
  border-radius: 24px;
  padding: 2.4rem 2.6rem;
  text-align: center;
  position: relative;
  transform-style: preserve-3d;
  box-shadow: 0 20px 70px #00000080, 0 2px 0 #a855f710 inset;
  transition: box-shadow 0.4s ease;
  overflow: visible;
  -webkit-tap-highlight-color: transparent;
}

@media (max-width: 480px) {
  html, body {
    height: 100%;
    height: 100dvh;
    overflow-y: auto;
  }
  body {
    align-items: center;
    justify-content: center;
    padding: 1rem;
  }
  #tilt-wrapper {
    width: 100%;
    max-width: 100%;
  }
  .card {
    padding: 1.5rem 1.1rem;
    border-radius: 18px;
    width: 100%;
  }
  .avatar { width: 72px; height: 72px; }
  .username { font-size: 1.35rem; }
  .bio { font-size: 0.9rem; }
  .sp-title { font-size: 0.75rem; }
  .sp-art { width: 36px; height: 36px; }
  .sp-btn.play { width: 30px; height: 30px; }
  .sp-btn.play svg { width: 13px; height: 13px; }
  .sp-btn svg { width: 15px; height: 15px; }
  .icon-btn { width: 44px; height: 44px; }
}

/* DESKTOP FIT — scale card down so it never overflows viewport */
@media (min-width: 481px) and (max-height: 780px) {
  .card { padding: 1.6rem 2rem; }
  .avatar { width: 72px; height: 72px; }
  .avatar-wrap { margin-bottom: 0.7rem; }
  .username { font-size: 1.35rem; min-height: 1.6rem; }
  .handle { font-size: 0.7rem; margin-bottom: 0.6rem; }
  .bio { font-size: 0.88rem; margin-bottom: 0.8rem; }
  .badges { margin-bottom: 0.8rem; gap: 4px; }
  .divider { margin: 0.6rem 0; }
  .spotify-bar { padding: 9px 11px; margin-bottom: 0.7rem; }
  .sp-art { width: 36px; height: 36px; }
  .sp-label { font-size: 0.55rem; }
  .sp-title { font-size: 0.76rem; }
  .sp-artist { font-size: 0.62rem; }
  .sp-progress-wrap { margin-top: 5px; }
  .links { gap: 9px; padding-top: 5px; }
  .icon-btn { width: 42px; height: 42px; }
  .views { margin-top: 0.8rem; }
}

@media (min-width: 481px) and (max-height: 640px) {
  .card { padding: 1.1rem 1.6rem; }
  .avatar { width: 60px; height: 60px; }
  .avatar-wrap { margin-bottom: 0.5rem; }
  .username { font-size: 1.15rem; min-height: 1.4rem; }
  .handle { font-size: 0.65rem; margin-bottom: 0.4rem; }
  .bio { font-size: 0.8rem; margin-bottom: 0.6rem; min-height: 1.4rem; }
  .badges { margin-bottom: 0.6rem; }
  .badge { font-size: 0.6rem; padding: 2px 8px; }
  .divider { margin: 0.4rem 0; }
  .spotify-bar { padding: 7px 9px; margin-bottom: 0.5rem; gap: 8px; }
  .sp-art { width: 30px; height: 30px; }
  .sp-btn.play { width: 28px; height: 28px; }
  .sp-btn.play svg { width: 12px; height: 12px; }
  .sp-btn svg { width: 14px; height: 14px; }
  .sp-progress-wrap { margin-top: 4px; }
  .links { gap: 7px; padding-top: 4px; }
  .icon-btn { width: 38px; height: 38px; border-radius: 11px; }
  .views { margin-top: 0.5rem; font-size: 0.6rem; }
}

.card.glow {
  box-shadow: 0 0 60px #a855f728, 0 0 120px #7c3aed12,
              0 20px 70px #00000080, 0 2px 0 #a855f710 inset;
}

.card-depth  { position: absolute; inset: 0; border-radius: 24px; transform: translateZ(-8px) scale(1.02); border: 1px solid #a855f718; pointer-events: none; }
.card-depth2 { position: absolute; inset: 0; border-radius: 24px; transform: translateZ(-16px) scale(1.04); border: 1px solid #7c3aed10; pointer-events: none; }

/* VOLUME CONTROL */
.volume-ctrl {
  position: fixed;
  top: 20px; right: 24px;
  display: flex; align-items: center; gap: 7px;
  z-index: 200;
  background: #0f0f1acc;
  border: 1px solid #a855f730;
  border-radius: 99px;
  padding: 7px 14px;
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
}
@media (max-width: 480px) {
  .volume-ctrl { top: 12px; right: 12px; padding: 6px 10px; }
}

.vol-icon {
  display: flex; align-items: center; justify-content: center;
  color: #fff; flex-shrink: 0; width: 16px; height: 16px;
}
.vol-icon svg { display: block; }
.vol-slider {
  -webkit-appearance: none;
  appearance: none;
  width: 72px; height: 3px;
  border-radius: 99px;
  background: linear-gradient(to right, #a855f7 var(--val, 80%), #ffffff18 var(--val, 80%));
  outline: none;
  touch-action: none;
}
.vol-slider::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 14px; height: 14px;
  border-radius: 50%;
  background: #a855f7;
  box-shadow: 0 0 6px #a855f770;
}
.vol-slider::-moz-range-thumb {
  width: 14px; height: 14px;
  border-radius: 50%;
  background: #a855f7;
  border: none;
  box-shadow: 0 0 6px #a855f770;
}

/* AVATAR */
.avatar-wrap { position: relative; display: inline-block; margin-bottom: 1.1rem; transform: translateZ(20px); }
.avatar {
  width: 88px; height: 88px; border-radius: 50%;
  border: 2px solid var(--accent);
  object-fit: cover;
  box-shadow: 0 0 28px #a855f755;
  display: block;
}
.status-dot {
  position: absolute; bottom: 4px; right: 4px;
  width: 15px; height: 15px; border-radius: 50%;
  background: #a855f7; border: 2px solid var(--card);
  box-shadow: 0 0 10px #a855f780;
}

.username {
  font-size: 1.65rem; font-weight: 800; display: block;
  color: #a855f7;
  margin-bottom: 0.25rem;
  transform: translateZ(15px);
  min-height: 2rem;
  letter-spacing: 0.01em;
}
.username .name-cursor {
  display: inline-block; width: 2px; height: 1em;
  background: #a855f7;
  margin-left: 2px; vertical-align: middle;
  animation: blink 0.8s step-end infinite;
}

.handle { font-family: 'DM Mono', monospace; font-size: 0.76rem; color: var(--muted); margin-bottom: 0.9rem; }

.bio {
  font-size: 1rem; font-weight: 700; line-height: 1.6;
  margin-bottom: 1.2rem; padding: 0 0.4rem; min-height: 1.8rem;
  background: linear-gradient(90deg, #a855f7, #c084fc, #7c3aed, #a855f7);
  background-size: 200% auto;
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
  animation: gradshift 4s linear infinite;
}
@keyframes gradshift {
  0%   { background-position: 0% center; }
  100% { background-position: 200% center; }
}
.bio .cursor {
  display: inline-block; width: 2px; height: 1em;
  background: #a855f7 !important;
  margin-left: 2px; vertical-align: middle;
  animation: blink 0.8s step-end infinite;
  -webkit-text-fill-color: initial;
  background-clip: initial !important;
  -webkit-background-clip: initial !important;
}

.badges { display: flex; flex-wrap: wrap; gap: 5px; justify-content: center; margin-bottom: 1.2rem; transform: translateZ(8px); }
.badge {
  font-family: 'DM Mono', monospace; font-size: 0.65rem;
  padding: 3px 10px; border-radius: 99px;
  border: 1px solid #a855f720; color: var(--muted); background: var(--btn-bg);
}
.badge.special {
  border-color: #a855f740; color: #c084fc;
  background: linear-gradient(135deg, #a855f712, #7c3aed08);
}

.divider { height: 1px; background: linear-gradient(90deg, transparent, #a855f725, transparent); margin: 1rem 0; }

/* SPOTIFY BAR */
.spotify-bar {
  background: #0a0a0f; border: 1px solid #a855f730;
  border-radius: 14px; padding: 12px 14px; margin-bottom: 1rem;
  display: flex; align-items: center; gap: 12px;
  transform: translateZ(6px);
}

.sp-art {
  width: 42px; height: 42px; border-radius: 8px;
  background: linear-gradient(135deg, #2a1a3e, #1a1a2e);
  border: 1px solid #a855f720;
  flex-shrink: 0; display: flex; align-items: center; justify-content: center;
  font-size: 18px; overflow: hidden; position: relative;
}
.sp-art img {
  width: 100%; height: 100%; object-fit: cover;
  border-radius: 8px; display: none;
}
.sp-art img.loaded { display: block; }
.sp-art img.loaded + .sp-art-emoji { display: none; }

.sp-info { flex: 1; text-align: left; overflow: hidden; }
.sp-title  { font-size: 0.82rem; font-weight: 700; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.sp-artist { font-family: 'DM Mono', monospace; font-size: 0.68rem; color: var(--muted); }
.sp-label  { font-family: 'DM Mono', monospace; font-size: 0.6rem; color: #a855f7; margin-bottom: 2px; display: flex; align-items: center; gap: 4px; }
.sp-dot    { width: 6px; height: 6px; border-radius: 50%; background: #a855f7; animation: spdot 1.5s ease infinite; flex-shrink: 0; }
@keyframes spdot { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.3; transform: scale(0.6); } }

.sp-progress-wrap {
  margin-top: 8px;
  display: flex; align-items: center; gap: 6px;
}
.sp-time {
  font-family: 'DM Mono', monospace;
  font-size: 0.55rem; color: var(--muted);
  flex-shrink: 0; width: 28px;
}
.sp-time.right { text-align: right; }

.sp-progress {
  flex: 1; height: 6px; background: #ffffff15;
  border-radius: 99px; overflow: visible;
  position: relative;
  touch-action: none;
}
.sp-progress-inner {
  position: relative; width: 100%; height: 100%;
  border-radius: 99px; overflow: hidden;
}
.sp-fill {
  height: 100%;
  background: linear-gradient(90deg, #a855f7, #c084fc);
  border-radius: 99px; width: 0%;
  transition: width 0.3s linear;
  pointer-events: none;
}
.sp-fill.seeking { transition: none; }

.sp-thumb {
  position: absolute; top: 50%; right: -6px;
  width: 12px; height: 12px; border-radius: 50%;
  background: #fff; transform: translateY(-50%) scale(0);
  transition: transform 0.15s ease;
  pointer-events: none;
  box-shadow: 0 0 6px #a855f780;
}
.sp-progress:hover .sp-thumb,
.sp-progress.dragging .sp-thumb { transform: translateY(-50%) scale(1); }
.sp-progress.dragging .sp-fill  { transition: none; }

/* PLAYER CONTROLS — SVG icons, consistent cross-platform */
.sp-controls { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }

.sp-btn {
  background: transparent; border: none;
  color: var(--muted);
  padding: 6px;
  transition: color 0.2s, transform 0.15s;
  line-height: 1;
  display: flex; align-items: center; justify-content: center;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
}
.sp-btn:hover, .sp-btn:active { color: var(--text); transform: scale(1.15); }

.sp-btn svg { width: 18px; height: 18px; display: block; }

.sp-btn.play {
  width: 36px; height: 36px; border-radius: 50%;
  background: linear-gradient(135deg, #a855f7, #7c3aed); color: #fff;
  padding: 0;
}
.sp-btn.play svg { width: 16px; height: 16px; }
.sp-btn.play:hover, .sp-btn.play:active {
  background: linear-gradient(135deg, #c084fc, #a855f7);
  transform: scale(1.1);
}

/* SOCIAL ICONS */
.links {
  display: flex; flex-direction: row;
  justify-content: center; align-items: center;
  gap: 12px; transform: translateZ(4px); flex-wrap: wrap;
  overflow: visible;
  padding-top: 8px;
}
.icon-btn {
  display: flex; align-items: center; justify-content: center;
  width: 48px; height: 48px; border-radius: 14px;
  background: var(--btn-bg); border: 1px solid #a855f720;
  color: var(--muted); text-decoration: none; font-size: 20px;
  transition: background 0.2s, border-color 0.2s, transform 0.15s, box-shadow 0.2s, color 0.2s;
  position: relative;
  overflow: visible;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
}
.icon-btn .tip { display: none; }
.icon-btn svg { width: 20px; height: 20px; display: block; flex-shrink: 0; fill: currentColor; }
.icon-btn:hover, .icon-btn:active {
  background: var(--btn-hover); border-color: #a855f755; color: #c084fc;
  transform: translateY(-3px) scale(1.08); box-shadow: 0 6px 22px #a855f725;
}

/* Tooltip — desktop only */
#floating-tip {
  position: fixed;
  background: #1a1a2e; border: 1px solid #a855f730;
  color: var(--muted); font-family: 'DM Mono', monospace;
  font-size: 0.62rem; white-space: nowrap;
  padding: 4px 10px; border-radius: 6px;
  pointer-events: none;
  z-index: 999999;
  opacity: 0;
  transition: opacity 0.15s ease;
  transform: translateX(-50%);
}

.views { font-family: 'DM Mono', monospace; font-size: 0.68rem; color: var(--muted); margin-top: 1.2rem; opacity: 0.4; }

/* DESKTOP CURSOR */
#cursor-dot, #cursor-ring { display: none; }
body.is-desktop #cursor-dot,
body.is-desktop #cursor-ring { display: block; }

#cursor-dot {
  position: fixed; top: 0; left: 0;
  width: 10px; height: 10px; border-radius: 50%;
  background: #a855f7; pointer-events: none; z-index: 99999;
  transform: translate(-50%, -50%);
  box-shadow: 0 0 10px #a855f7, 0 0 22px #a855f780;
  transition: transform 0.05s, width 0.2s, height 0.2s;
  mix-blend-mode: screen;
}
#cursor-ring {
  position: fixed; top: 0; left: 0;
  width: 36px; height: 36px; border-radius: 50%;
  border: 1.5px solid #a855f780; pointer-events: none; z-index: 99998;
  transform: translate(-50%, -50%);
  box-shadow: 0 0 8px #a855f740;
  transition: width 0.2s, height 0.2s, border-color 0.2s, opacity 0.2s;
}

.trail-dot {
  position: fixed; border-radius: 50%;
  pointer-events: none; z-index: 99990;
  transform: translate(-50%, -50%);
  mix-blend-mode: screen;
  display: none;
}
body.is-desktop .trail-dot { display: block; }

.spark {
  position: fixed; pointer-events: none;
  z-index: 99995; width: 6px; height: 6px; border-radius: 50%;
  animation: spark-fly 0.6s ease forwards;
}
@keyframes spark-fly {
  0%   { opacity: 1; transform: translate(0,0) scale(1); }
  100% { opacity: 0; transform: var(--tx) scale(0); }
}


</style>
</head>
<body>

<canvas id="rain-canvas"></canvas>

<div id="cursor-dot"></div>
<div id="cursor-ring"></div>

<div class="bg-orb orb1"></div>
<div class="bg-orb orb2"></div>
<div class="bg-orb orb3"></div>

<div id="enter-screen">
  <div class="bg-orb orb1"></div>
  <div class="bg-orb orb2"></div>
  <div class="enter-logo">killez</div>
  <button class="enter-btn" id="enter-btn">CLICK TO ENTER</button>
  <p class="enter-sub">killez.io</p>
</div>

<div class="volume-ctrl">
  <span class="vol-icon" id="vol-icon">
    <svg id="vol-svg" width="16" height="16" viewBox="0 0 24 24" fill="white" xmlns="http://www.w3.org/2000/svg">
      <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>
    </svg>
  </span>
  <input type="range" class="vol-slider" id="vol-slider" min="0" max="100" value="80" style="--val: 80%;"/>
</div>

<div id="floating-tip"></div>

<div id="tilt-wrapper">
  <div class="card" id="card">
    <div class="card-depth"></div>
    <div class="card-depth2"></div>

    <div class="avatar-wrap">
      <img src="assets/avatar.png" class="avatar" alt="avatar"/>
      <div class="status-dot"></div>
    </div>

    <span class="username" id="username"><span class="name-cursor"></span></span>
    <p class="handle">@killez</p>
    <p class="bio" id="bio"><span class="cursor"></span></p>

    <div class="badges">
      <span class="badge">💜 dev</span>
      <span class="badge">✦ currently modding in gta</span>
    </div>

    <div class="divider"></div>

    <div class="spotify-bar">
      <div class="sp-art" id="sp-art">
        <img id="sp-art-img" src="" alt=""/>
        <span class="sp-art-emoji" id="sp-art-emoji">🎵</span>
      </div>

      <div class="sp-info">
        <div class="sp-label"><span class="sp-dot"></span><span id="sp-status">paused</span></div>
        <div class="sp-title"  id="sp-title">your song title here</div>
        <div class="sp-artist" id="sp-artist">artist name</div>

        <div class="sp-progress-wrap">
          <span class="sp-time" id="sp-time-cur">0:00</span>
          <div class="sp-progress" id="sp-progress">
            <div class="sp-progress-inner">
              <div class="sp-fill" id="sp-fill"></div>
            </div>
            <div class="sp-thumb" id="sp-thumb"></div>
          </div>
          <span class="sp-time right" id="sp-time-dur">0:00</span>
        </div>
      </div>

      <div class="sp-controls">
        <!-- Prev: skip-back icon -->
        <button class="sp-btn" id="sp-prev" aria-label="Previous">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/>
          </svg>
        </button>
        <!-- Play/Pause -->
        <button class="sp-btn play" id="sp-play" aria-label="Play/Pause">
          <!-- icon swapped by JS -->
          <svg id="play-icon" viewBox="0 0 24 24" fill="currentColor">

<script>
const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent)

(function() {
  const canvas = document.getElementById('rain-canvas');
  const ctx = canvas.getContext('2d');
  let W, H, drops = [];
  const DROP_COUNT = isMobile ? 100 : 200;

  function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
  window.addEventListener('resize', resize);
  resize();

  function randBetween(a, b) { return a + Math.random() * (b - a); }

  function createDrop() {
    return {
      x: randBetween(0, W), y: randBetween(-H, 0),
      len: randBetween(30, 70), speed: randBetween(14, 30),
      opacity: randBetween(0.4, 0.9), width: randBetween(1.0, 2.2),
      angle: randBetween(-0.04, 0.04),
    };
  }
  for (let i = 0; i < DROP_COUNT; i++) { const d = createDrop(); d.y = randBetween(-H, H); drops.push(d); }

  const splashes = [];
  function addSplash(x, y) {
    const count = Math.floor(randBetween(2, 5));
    for (let i = 0; i < count; i++) splashes.push({ x, y, vx: randBetween(-1.2, 1.2), vy: randBetween(-1.5, -0.3), life: 1, decay: randBetween(0.06, 0.14), r: randBetween(1, 2.5) });
  }

  function drawRain() {
    ctx.clearRect(0, 0, W, H);
    drops.forEach(d => {
      const dx = Math.sin(d.angle) * d.len, dy = Math.cos(d.angle) * d.len;
      const grad = ctx.createLinearGradient(d.x, d.y, d.x + dx, d.y + dy);
      grad.addColorStop(0, `rgba(168, 85, 247, 0)`);
      grad.addColorStop(0.5, `rgba(192, 132, 252, ${d.opacity * 0.7})`);
      grad.addColorStop(1, `rgba(168, 85, 247, ${d.opacity})`);
      ctx.beginPath(); ctx.moveTo(d.x, d.y); ctx.lineTo(d.x + dx, d.y + dy);
      ctx.strokeStyle = grad; ctx.lineWidth = d.width; ctx.lineCap = 'round'; ctx.stroke();
      d.x += d.speed * Math.sin(d.angle); d.y += d.speed;
      if (d.y - d.len > H) { addSplash(d.x, H - 1); Object.assign(d, createDrop()); d.y = -d.len; }
      if (d.x > W + 20) d.x = -20;
      if (d.x < -20)    d.x = W + 20;
    });
    for (let i = splashes.length - 1; i >= 0; i--) {
      const s = splashes[i];
      ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(168, 85, 247, ${s.life * 0.5})`; ctx.fill();
      s.x += s.vx; s.y += s.vy; s.vy += 0.12; s.life -= s.decay;
      if (s.life <= 0) splashes.splice(i, 1);
    }
    requestAnimationFrame(drawRain);
  }
  drawRain();
})();

const TRACKS = [
  { title: "fukk rapping bru", artist: "*67", src: "assets/songs/song1.mp3", img: "assets/covers/song1.jpg", emoji: "🎵" },

function fmtTime(s) {
  if (!isFinite(s) || isNaN(s)) return '0:00';
  const m = Math.floor(s / 60), sec = Math.floor(s % 60);
  return `${m}:${sec.toString().padStart(2, '0')}`;
}

let current = 0, playing = false, progTimer = null;
const audio      = document.getElementById('audio');
const spPlay     = document.getElementById('sp-play');
const playIcon   = document.getElementById('play-icon');
const card       = document.getElementById('card');
const wrapper    = document.getElementById('tilt-wrapper');
const spFill     = document.getElementById('sp-fill');
const spProg     = document.getElementById('sp-progress');
const spCurEl    = document.getElementById('sp-time-cur');

const PLAY_PATH  = '<path d="M8 5v14l11-7z"/>';
const PAUSE_PATH = '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>';

const volSlider = document.getElementById('vol-slider');
audio.volume = 0.8;

const VOL_ICONS = {
  mute: '<path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/>',
  low:  '<path d="M18.5 12c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM5 9v6h4l5 5V4L9 9H5z"/>',
  mid:  '<path d="M18.5 12c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM5 9v6h4l5 5V4L9 9H5z"/><path d="M14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z" opacity=".4"/>',
  high: '<path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>',
};
const volSvg = document.getElementById('vol-svg');

function updateVolIcon(v) {
  if (v === 0)       volSvg.innerHTML = VOL_ICONS.mute;
  else if (v < 0.35) volSvg.innerHTML = VOL_ICONS.low;
  else if (v < 0.7)  volSvg.innerHTML = VOL_ICONS.mid;
  else               volSvg.innerHTML = VOL_ICONS.high;

volSlider.addEventListener('input', () => {

function loadTrack(i) {
  const t = TRACKS[i];
  document.getElementById('sp-title').textContent  = t.title;
  document.getElementById('sp-artist').textContent = t.artist;
  audio.src = t.src;
  spFill.style.width = '0%';
  spCurEl.textContent = '0:00';
  spDurEl.textContent = '0:00';
  if (t.img) {
    spArtImg.src = t.img;
    spArtImg.onload  = () => spArtImg.classList.add('loaded');
    spArtImg.onerror = () => { spArtImg.classList.remove('loaded'); spArtEmoji.textContent = t.emoji; };
    spArtImg.classList.remove('loaded');
  } else {
    spArtImg.src = ''; spArtImg.classList.remove('loaded'); spArtEmoji.textContent = t.emoji;
  }
}

audio.addEventListener('loadedmetadata', () => { spDurEl.textContent = fmtTime(audio.duration); });

function setPlaying(s) {
  playing = s;
  playIcon.innerHTML = s ? PAUSE_PATH : PLAY_PATH;
  document.getElementById('sp-status').textContent = s ? 'listening now' : 'paused';
  if (s) { startProg(); card.classList.add('glow'); }
  else   { clearInterval(progTimer); card.classList.remove('glow'); }
}

function startProg() {
  clearInterval(progTimer);
  progTimer = setInterval(() => {
    if (!isDragging && audio.duration) {
      const pct = audio.currentTime / audio.duration * 100;
      spFill.style.width = pct + '%';
      spCurEl.textContent = fmtTime(audio.currentTime);
      spDurEl.textContent = fmtTime(audio.duration);
    }
  }, 250);
}

spPlay.addEventListener('click', () => {
  playing ? audio.pause() : audio.play().catch(() => {});
  setPlaying(!playing);
});
document.getElementById('sp-prev').addEventListener('click', () => {
  current = (current - 1 + TRACKS.length) % TRACKS.length;
  loadTrack(current); if (playing) audio.play().catch(() => {});
});
document.getElementById('sp-next').addEventListener('click', () => {
  current = (current + 1) % TRACKS.length;
  loadTrack(current); if (playing) audio.play().catch(() => {});
});
loadTrack(0);

let isDragging = false;

function seekTo(clientX) {
  const rect = spProg.getBoundingClientRect();
  let pct = (clientX - rect.left) / rect.width;
  pct = Math.max(0, Math.min(1, pct));
  if (audio.duration) {
    audio.currentTime = pct * audio.duration;
    spFill.style.width = (pct * 100) + '%';
    spCurEl.textContent = fmtTime(audio.currentTime);
  }
}

spProg.addEventListener('mousedown', (e) => {
  isDragging = true; spProg.classList.add('dragging'); spFill.classList.add('seeking'); seekTo(e.clientX);
});
window.addEventListener('mousemove', (e) => { if (isDragging) seekTo(e.clientX); });
window.addEventListener('mouseup', () => {
  if (isDragging) { isDragging = false; spProg.classList.remove('dragging'); spFill.classList.remove('seeking'); }
});

spProg.addEventListener('touchstart', (e) => {
  isDragging = true; spProg.classList.add('dragging'); spFill.classList.add('seeking');
  seekTo(e.touches[0].clientX); e.preventDefault();
}, { passive: false });
window.addEventListener('touchmove', (e) => {
  if (isDragging) { seekTo(e.touches[0].clientX); e.preventDefault(); }
}, { passive: false });
window.addEventListener('touchend', () => {
  if (isDragging) { isDragging = false; spProg.classList.remove('dragging'); spFill.classList.remove('seeking'); }
});

const usernameEl = document.getElementById('username');
const NAME = 'killez';
function typeUsername() {
  const cursor = usernameEl.querySelector('.name-cursor') || (() => { const c = document.createElement('span'); c.className = 'name-cursor'; return c; })();
  let i = 0;
  function typeIn() {
    if (i <= NAME.length) { usernameEl.textContent = NAME.slice(0, i); usernameEl.appendChild(cursor); i++; setTimeout(typeIn, 110); }
    else { setTimeout(deleteOut, 1600); }
  }
  function deleteOut() {
    const cur = usernameEl.textContent.replace('|', '').length;
    if (cur > 0) { usernameEl.textContent = NAME.slice(0, cur - 1); usernameEl.appendChild(cursor); setTimeout(deleteOut, 60); }
    else { i = 0; setTimeout(typeIn, 400); }
  }
  typeIn();
}

const bioEl = document.getElementById('bio');
let phraseIndex = 0;

bioText.id = 'bio-text';
bioEl.insertBefore(bioText, bioEl.querySelector('.cursor'));
function typeIn() {
  const line = BIO_PHRASES[phraseIndex];
  if (bioText.textContent.length < line.length) { bioText.textContent += line[bioText.textContent.length]; setTimeout(typeIn, 55); }
  else { setTimeout(deleteOut, 1800); }
}
function deleteOut() {
  if (bioText.textContent.length > 0) { bioText.textContent = bioText.textContent.slice(0, -1); setTimeout(deleteOut, 30); }
  else { phraseIndex = (phraseIndex + 1) % BIO_PHRASES.length; setTimeout(typeIn, 400); }
}

document.getElementById('enter-btn').addEventListener('click', () => {

const MAX_TILT = 18;
let isHovering = false;

function applyTilt(rx, ry) {
  wrapper.style.transform = `rotateX(${rx}deg) rotateY(${ry}deg)`;
  const sx = ry * 1.2, sy = -rx * 1.2;
  card.style.boxShadow = card.classList.contains('glow')
    ? `${sx}px ${sy + 20}px 60px #00000080, 0 0 60px #a855f728`
    : `${sx}px ${sy + 20}px 60px #00000080`;
}

function resetTilt() {
  wrapper.classList.remove('tilting');
  wrapper.style.transform = 'rotateX(0deg) rotateY(0deg)';
  card.style.boxShadow = card.classList.contains('glow')
    ? '0 0 60px #a855f728, 0 0 120px #7c3aed12, 0 20px 70px #00000080'
    : '0 20px 70px #00000080';
}

if (!isMobile) {
  wrapper.addEventListener('mouseenter', () => { isHovering = true; wrapper.classList.add('tilting'); });
  wrapper.addEventListener('mouseleave', () => { isHovering = false; resetTilt(); });
  wrapper.addEventListener('mousemove', (e) => {
    if (!isHovering) return;
    const rect = wrapper.getBoundingClientRect();
    const dx = (e.clientX - rect.left) / rect.width  - 0.5;
    const dy = (e.clientY - rect.top)  / rect.height - 0.5;
    applyTilt(-dy * MAX_TILT * 2, dx * MAX_TILT * 2);
  });
} else {
  let tiltTouchId = null;
  let tiltStartX = 0, tiltStartY = 0;
  let tiltActive = false;

  wrapper.addEventListener('touchstart', (e) => {
    if (e.target.closest('#sp-progress')) return;
    const t = e.changedTouches[0];
    tiltTouchId = t.identifier;
    tiltStartX = t.clientX;
    tiltStartY = t.clientY;
    tiltActive = false;
    wrapper.classList.add('tilting');
  }, { passive: true });

  wrapper.addEventListener('touchmove', (e) => {
    if (e.target.closest('#sp-progress')) return;
    let touch = null;
    for (let i = 0; i < e.changedTouches.length; i++) {
      if (e.changedTouches[i].identifier === tiltTouchId) { touch = e.changedTouches[i]; break; }
    }
    if (!touch) return;

    const dx = touch.clientX - tiltStartX;
    const dy = touch.clientY - tiltStartY;

    if (!tiltActive && Math.abs(dx) > Math.abs(dy) + 5) tiltActive = true;
    if (!tiltActive) return;

    e.preventDefault();

    const rect = wrapper.getBoundingClientRect();
    const nx = (touch.clientX - rect.left) / rect.width  - 0.5;
    const ny = (touch.clientY - rect.top)  / rect.height - 0.5;
    applyTilt(-ny * MAX_TILT * 1.4, nx * MAX_TILT * 1.4);
  }, { passive: false });

  wrapper.addEventListener('touchend', () => {
    tiltTouchId = null; tiltActive = false; resetTilt();
  }, { passive: true });
  wrapper.addEventListener('touchcancel', () => {
    tiltTouchId = null; tiltActive = false; resetTilt();
  }, { passive: true });
}

function spawnSparks(cx, cy) {
  for (let i = 0; i < 8; i++) {
    const s = document.createElement('div');
    s.className = 'spark';
    const angle = (Math.PI * 2 / 8) * i;
    const dist = 30 + Math.random() * 45;
    s.style.left = cx + 'px'; s.style.top = cy + 'px';
    s.style.setProperty('--tx', `translate(${Math.cos(angle) * dist}px, ${Math.sin(angle) * dist}px)`);
    s.style.background = i % 2 === 0 ? '#a855f7' : '#c084fc';
    s.style.animationDelay = (Math.random() * 0.1) + 's';
    document.body.appendChild(s);
    setTimeout(() => s.remove(), 700);
  }
}
document.addEventListener('click', (e) => spawnSparks(e.clientX, e.clientY));

if (!isMobile) {
  const dot  = document.getElementById('cursor-dot');
  const ring = document.getElementById('cursor-ring');
  const TRAIL_COUNT = 12;
  const trail = [];
  let mx = window.innerWidth / 2, my = window.innerHeight / 2;
  let rx2 = mx, ry2 = my;

  for (let i = 0; i < TRAIL_COUNT; i++) {
    const d = document.createElement('div');
    d.className = 'trail-dot';
    const t = 1 - i / TRAIL_COUNT;
    const size = Math.round(8 * t);
    d.style.width  = size + 'px'; d.style.height = size + 'px';
    d.style.opacity = (t * 0.6).toFixed(2);
    d.style.background = `hsl(${270 + i * 2}, 90%, ${70 + i}%)`;
    d.style.boxShadow  = `0 0 ${Math.round(6 * t)}px hsl(${270 + i * 2}, 90%, 75%)`;
    document.body.appendChild(d);
    trail.push({ el: d, x: 0, y: 0 });
  }

  document.addEventListener('mousemove', (e) => {
    mx = e.clientX; my = e.clientY;
    dot.style.left = mx + 'px'; dot.style.top = my + 'px';
  });

  document.querySelectorAll('a, button, .icon-btn, .sp-progress, .vol-slider').forEach(el => {
    el.addEventListener('mouseenter', () => {
      dot.style.width = '6px'; dot.style.height = '6px';
      ring.style.width = '52px'; ring.style.height = '52px';
      ring.style.borderColor = '#a855f7'; ring.style.boxShadow = '0 0 18px #a855f760';
    });
    el.addEventListener('mouseleave', () => {
      dot.style.width = '10px'; dot.style.height = '10px';
      ring.style.width = '36px'; ring.style.height = '36px';
      ring.style.borderColor = '#a855f780'; ring.style.boxShadow = '0 0 8px #a855f740';
    });
  });

  document.addEventListener('mousedown', () => {
    dot.style.transform  = 'translate(-50%,-50%) scale(0.6)';
    ring.style.transform = 'translate(-50%,-50%) scale(1.4)';
    ring.style.opacity   = '0.4';
  });
  document.addEventListener('mouseup', () => {
    dot.style.transform  = 'translate(-50%,-50%) scale(1)';
    ring.style.transform = 'translate(-50%,-50%) scale(1)';
    ring.style.opacity   = '1';
  });

  let positions = Array(TRAIL_COUNT).fill(null).map(() => ({ x: mx, y: my }));
  function animateCursor() {
    rx2 += (mx - rx2) * 0.15; ry2 += (my - ry2) * 0.15;
    ring.style.left = rx2 + 'px'; ring.style.top = ry2 + 'px';
    positions.unshift({ x: mx, y: my });
    positions = positions.slice(0, TRAIL_COUNT);
    for (let i = 0; i < TRAIL_COUNT; i++) {
      const p = positions[Math.min(i, positions.length - 1)];
      trail[i].el.style.left = p.x + 'px'; trail[i].el.style.top = p.y + 'px';
    }
    requestAnimationFrame(animateCursor);
  }
  animateCursor();

  const floatingTip = document.getElementById('floating-tip');
  let tipTimeout = null;
  document.querySelectorAll('.icon-btn').forEach(btn => {
    const label = btn.querySelector('.tip')?.textContent || '';
    btn.addEventListener('mouseenter', () => {
      clearTimeout(tipTimeout);
      const rect = btn.getBoundingClientRect();
      floatingTip.textContent = label;
      floatingTip.style.left = (rect.left + rect.width / 2) + 'px';
      floatingTip.style.top  = (rect.top - 10) + 'px';
      floatingTip.style.transform = 'translateX(-50%) translateY(-100%)';
      floatingTip.style.opacity = '1';
    });
    btn.addEventListener('mouseleave', () => {
      tipTimeout = setTimeout(() => { floatingTip.style.opacity = '0'; }, 80);
    });
  });
}
