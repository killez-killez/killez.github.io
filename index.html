<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>killez · transparent · live now playing (PKCE)</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0a;
            font-family: 'Inter', 'Space Grotesk', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            position: relative;
        }
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('https://i1.sndcdn.com/artworks-z2S8zFDT7LmNvbSs-L4Z4hA-t500x500.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            filter: brightness(0.8) blur(1px);
            z-index: -2;
        }
        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.2);
            z-index: -1;
        }
        .cursor-trail {
            position: fixed;
            width: 14px;
            height: 14px;
            background: #5865F2;
            border-radius: 50%;
            pointer-events: none;
            z-index: 99999;
            filter: blur(4px);
            opacity: 0.6;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 12px #5865F2;
        }
        .profile-card {
            max-width: 560px;
            width: 100%;
            background: transparent;
            border-radius: 2rem;
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: transform 0.2s, border-color 0.2s;
        }
        .profile-card:hover {
            border-color: #5865F2;
            transform: translateY(-4px);
        }
        .card-inner { padding: 2rem 1.8rem 1.8rem; }
        .avatar-section {
            display: flex;
            align-items: center;
            gap: 1.2rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }
        .avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: rgba(0,0,0,0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border: 2px solid #5865F2;
            box-shadow: 0 0 12px rgba(88,101,242,0.3);
        }
        .avatar img { width: 100%; height: 100%; object-fit: cover; }
        .username h1 {
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, #fff, #aaa);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
        }
        .username .handle {
            font-size: 0.75rem;
            color: rgba(255,255,255,0.8);
            margin-top: 4px;
            font-family: monospace;
        }
        .bio {
            margin-bottom: 1.5rem;
            padding: 0.8rem 0;
            border-top: 1px solid rgba(255,255,255,0.15);
            border-bottom: 1px solid rgba(255,255,255,0.15);
            color: rgba(255,255,255,0.9);
            font-size: 0.85rem;
        }
        .stats-row {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }
        .stat-item {
            background: rgba(0,0,0,0.5);
            padding: 0.4rem 1rem;
            border-radius: 40px;
            font-size: 0.7rem;
            color: rgba(255,255,255,0.8);
            border: 1px solid rgba(255,255,255,0.15);
        }
        .stat-value { font-weight: 700; color: #5865F2; margin-right: 4px; }
        .links-row {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.8rem;
        }
        .social-btn {
            flex: 1;
            background: rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 60px;
            padding: 0.7rem 0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            text-decoration: none;
            color: #fff;
            font-weight: 500;
            font-size: 0.85rem;
            transition: all 0.2s;
        }
        .social-btn.discord:hover { background: #5865F2; border-color: #5865F2; box-shadow: 0 0 12px #5865F2; }
        .social-btn.spotify:hover { background: #1DB954; border-color: #1DB954; box-shadow: 0 0 12px #1DB954; }
        .spotify-section { margin-top: 0.5rem; }
        .spotify-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 0.8rem;
            margin-bottom: 0.8rem;
        }
        .spotify-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: rgba(255,255,255,0.8);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .open-spotify-btn {
            background: rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 40px;
            padding: 0.25rem 0.8rem;
            font-size: 0.65rem;
            color: rgba(255,255,255,0.8);
            text-decoration: none;
            transition: 0.2s;
        }
        .open-spotify-btn:hover { background: #1DB954; color: white; }
        .now-playing {
            background: rgba(0,0,0,0.5);
            border-radius: 40px;
            padding: 0.5rem 1rem;
            margin-bottom: 0.8rem;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.75rem;
            border: 1px solid rgba(255,255,255,0.15);
            backdrop-filter: blur(4px);
        }
        .now-playing i { color: #1DB954; }
        .track-name { color: #fff; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; }
        .pulse-dot {
            width: 8px;
            height: 8px;
            background: #1DB954;
            border-radius: 50%;
            animation: pulse 1.2s infinite;
        }
        @keyframes pulse { 0% { opacity: 0.4; transform: scale(0.8); } 100% { opacity: 1; transform: scale(1.2); } }
        .spotify-login-btn {
            background: #1DB954;
            border: none;
            border-radius: 40px;
            padding: 0.3rem 1rem;
            font-size: 0.7rem;
            color: white;
            cursor: crosshair;
            transition: 0.2s;
        }
        .spotify-login-btn:hover { background: #1aa34a; transform: scale(1.02); }
        .spotify-embed { border-radius: 1rem; overflow: hidden; transition: transform 0.2s; }
        .spotify-embed:hover { transform: scale(1.01); box-shadow: 0 0 20px rgba(29,185,84,0.2); }
        iframe {
            width: 100%;
            border-radius: 1rem;
            border: none;
            height: 420px;
            background: #000;
        }
        .skeleton {
            background: linear-gradient(90deg, #1a1a1a 25%, #2a2a2a 50%, #1a1a1a 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: 1rem;
            height: 420px;
            width: 100%;
        }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
        .footer {
            text-align: center;
            font-size: 0.6rem;
            color: rgba(255,255,255,0.5);
            margin-top: 1.5rem;
            padding-top: 1rem;
            border-top: 1px solid rgba(255,255,255,0.1);
        }
        .toast {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: #1a1a1a;
            color: #5865F2;
            padding: 5px 12px;
            border-radius: 40px;
            font-size: 0.7rem;
            z-index: 1000;
            opacity: 0;
            transition: 0.2s;
            pointer-events: none;
            border: 1px solid #5865F2;
        }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(-5px); }
        @media (max-width: 550px) {
            .card-inner { padding: 1.5rem; }
            .avatar-section { flex-direction: column; text-align: center; }
            .stats-row { flex-direction: column; align-items: center; }
            iframe, .skeleton { height: 360px; }
        }
    </style>
</head>
<body>

<div class="profile-card">
    <div class="card-inner">
        <div class="avatar-section">
            <div class="avatar" id="burgerAvatar">
                <img src="https://i.imgur.com/l2ql2sy.jpeg" alt="killez">
            </div>
            <div class="username">
                <h1>killez</h1>
                <div class="handle">@killez</div>
            </div>
        </div>
        <div class="bio"><i class="fas fa-music"></i> i love music</div>
        <div class="stats-row">
            <div class="stat-item"><span class="stat-value" id="discordStatus">🟢</span> discord</div>
            <div class="stat-item"><span class="stat-value" id="currentDateTime">--:--</span> local</div>
        </div>
        <div class="links-row">
            <a href="#" class="social-btn discord" id="discordLink"><i class="fab fa-discord"></i> Discord</a>
            <a href="#" class="social-btn spotify" id="spotifyProfileLink"><i class="fab fa-spotify"></i> Spotify</a>
        </div>
        <div class="spotify-section">
            <div class="spotify-header">
                <div class="spotify-label"><i class="fab fa-spotify"></i> SPECTRAL ENGINE</div>
                <a href="https://open.spotify.com/playlist/6mF785KixssbIecQkMxzgs" target="_blank" class="open-spotify-btn"><i class="fas fa-external-link-alt"></i> OPEN IN SPOTIFY</a>
            </div>
            <div class="now-playing" id="nowPlayingWidget">
                <i class="fas fa-headphones"></i>
                <span class="track-name" id="currentTrackName">🔑 Connect Spotify</span>
                <button id="spotifyLoginBtn" class="spotify-login-btn"><i class="fab fa-spotify"></i> Connect</button>
            </div>
            <div class="spotify-embed">
                <div class="skeleton" id="skeletonLoader"></div>
                <iframe id="spotifyIframe" src="https://open.spotify.com/embed/playlist/6mF785KixssbIecQkMxzgs?utm_source=generator&theme=0&autoplay=1" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy" style="display: none;"></iframe>
            </div>
        </div>
        <div class="footer"><i class="fas fa-skull"></i> killez · custom hub</div>
    </div>
</div>
<div class="toast" id="toast">✓ Copied</div>

<script>
    (function() {
        const DISCORD_ID = "1105558964495716394";
        const SPOTIFY_USER = "31adusfvpe3vz5vvyuh2a457rivu";
        const MY_LINKS = {
            discord: `https://discord.com/users/${DISCORD_ID}`,
            spotifyProfile: `https://open.spotify.com/user/${SPOTIFY_USER}`
        };

        // ========== SPOTIFY PKCE AUTHENTICATION (response_type=code) ==========
        const CLIENT_ID = "345b6503b37b411fb3157efb5ddb2c1d";
        const REDIRECT_URI = window.location.origin + window.location.pathname;
        const SCOPES = "user-read-currently-playing user-read-playback-state";

        let accessToken = null;
        let refreshInterval = null;
        const trackNameSpan = document.getElementById('currentTrackName');
        const loginBtn = document.getElementById('spotifyLoginBtn');

        // Helper: generate random string for PKCE verifier
        function generateRandomString(length) {
            const possible = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789-._~';
            let text = '';
            for (let i = 0; i < length; i++) {
                text += possible.charAt(Math.floor(Math.random() * possible.length));
            }
            return text;
        }

        // Helper: SHA256 hash then base64url encode
        async function pkceChallengeFromVerifier(verifier) {
            const encoder = new TextEncoder();
            const data = encoder.encode(verifier);
            const digest = await crypto.subtle.digest('SHA-256', data);
            return btoa(String.fromCharCode(...new Uint8Array(digest)))
                .replace(/\+/g, '-')
                .replace(/\//g, '_')
                .replace(/=+$/, '');
        }

        // Start OAuth flow with PKCE
        async function loginToSpotify() {
            const codeVerifier = generateRandomString(64);
            localStorage.setItem('spotify_code_verifier', codeVerifier);
            const codeChallenge = await pkceChallengeFromVerifier(codeVerifier);

            const authUrl = new URL('https://accounts.spotify.com/authorize');
            authUrl.searchParams.append('client_id', CLIENT_ID);
            authUrl.searchParams.append('response_type', 'code');
            authUrl.searchParams.append('redirect_uri', REDIRECT_URI);
            authUrl.searchParams.append('code_challenge_method', 'S256');
            authUrl.searchParams.append('code_challenge', codeChallenge);
            authUrl.searchParams.append('scope', SCOPES);
            window.location.href = authUrl.toString();
        }

        // Exchange authorization code for access token
        async function exchangeCodeForToken(code, codeVerifier) {
            const tokenUrl = 'https://accounts.spotify.com/api/token';
            const body = new URLSearchParams({
                client_id: CLIENT_ID,
                grant_type: 'authorization_code',
                code: code,
                redirect_uri: REDIRECT_URI,
                code_verifier: codeVerifier
            });
            try {
                const response = await fetch(tokenUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: body
                });
                const data = await response.json();
                if (data.access_token) {
                    accessToken = data.access_token;
                    localStorage.setItem('spotify_token', accessToken);
                    if (data.refresh_token) localStorage.setItem('spotify_refresh_token', data.refresh_token);
                    // Remove code verifier from storage
                    localStorage.removeItem('spotify_code_verifier');
                    // Start fetching
                    fetchCurrentPlayback();
                    if (refreshInterval) clearInterval(refreshInterval);
                    refreshInterval = setInterval(fetchCurrentPlayback, 5000);
                    loginBtn.style.display = "none";
                    trackNameSpan.innerHTML = "Loading...";
                } else {
                    console.error("Token exchange failed", data);
                    loginBtn.style.display = "inline-flex";
                    trackNameSpan.innerHTML = "🔑 Connect Spotify";
                }
            } catch (err) {
                console.error("Token exchange error", err);
                loginBtn.style.display = "inline-flex";
            }
        }

        // Check URL for authorization code after redirect
        function handleRedirect() {
            const urlParams = new URLSearchParams(window.location.search);
            const code = urlParams.get('code');
            if (code) {
                const codeVerifier = localStorage.getItem('spotify_code_verifier');
                if (codeVerifier) {
                    exchangeCodeForToken(code, codeVerifier);
                    // Clean URL
                    window.history.replaceState({}, document.title, window.location.pathname);
                } else {
                    console.warn("No code verifier found");
                }
            }
        }

        function updateNowPlaying(trackName, artistName, isPlaying) {
            if (trackName && artistName) {
                trackNameSpan.innerHTML = `${trackName} - ${artistName}`;
                trackNameSpan.style.color = isPlaying ? "#fff" : "#aaa";
                loginBtn.style.display = "none";
            } else {
                trackNameSpan.innerHTML = "⚪ Nothing playing";
                loginBtn.style.display = "inline-flex";
            }
        }

        async function fetchCurrentPlayback() {
            if (!accessToken) return;
            try {
                const response = await fetch('https://api.spotify.com/v1/me/player/currently-playing', {
                    headers: { 'Authorization': `Bearer ${accessToken}` }
                });
                if (response.status === 204) {
                    updateNowPlaying(null, null, false);
                    return;
                }
                if (response.status === 200) {
                    const data = await response.json();
                    if (data && data.item) {
                        const trackName = data.item.name;
                        const artistName = data.item.artists.map(a => a.name).join(', ');
                        const isPlaying = data.is_playing;
                        updateNowPlaying(trackName, artistName, isPlaying);
                    } else {
                        updateNowPlaying(null, null, false);
                    }
                } else if (response.status === 401) {
                    // Token expired, try to refresh or clear
                    accessToken = null;
                    localStorage.removeItem('spotify_token');
                    loginBtn.style.display = "inline-flex";
                    trackNameSpan.innerHTML = "🔑 Connect Spotify";
                }
            } catch (err) {
                console.warn("Fetch error", err);
            }
        }

        // Initialize: check for saved token or handle redirect
        const savedToken = localStorage.getItem('spotify_token');
        if (savedToken) {
            accessToken = savedToken;
            fetchCurrentPlayback();
            refreshInterval = setInterval(fetchCurrentPlayback, 5000);
            loginBtn.style.display = "none";
        } else {
            handleRedirect();
        }

        loginBtn.addEventListener('click', loginToSpotify);

        // ========== OTHER FEATURES ==========
        let audioCtx = null;
        function playClick() { try { if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); const o = audioCtx.createOscillator(); const g = audioCtx.createGain(); o.connect(g); g.connect(audioCtx.destination); o.frequency.value = 880; g.gain.value = 0.05; o.start(); g.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.15); o.stop(audioCtx.currentTime + 0.15); } catch(e){} }

        const iframe = document.getElementById('spotifyIframe');
        const skeleton = document.getElementById('skeletonLoader');
        iframe.addEventListener('load', () => { skeleton.style.display = 'none'; iframe.style.display = 'block'; });
        setTimeout(() => { if (iframe.style.display !== 'block') { skeleton.style.display = 'none'; iframe.style.display = 'block'; } }, 3500);

        function updateDateTime() {
            const now = new Date();
            document.getElementById('currentDateTime').textContent = now.toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' });
        }
        setInterval(updateDateTime, 1000);
        updateDateTime();

        const statuses = ["🟢 ONLINE", "🌙 IDLE", "🎮 STREAMING"];
        function updateDiscordStatus() {
            const h = new Date().getHours();
            let i = (h>=2 && h<8) ? 1 : (h>=20 && h<23) ? 2 : 0;
            document.getElementById('discordStatus').innerHTML = statuses[i];
        }
        updateDiscordStatus();
        setInterval(updateDiscordStatus, 30000);

        let trail = null, mx = 0, my = 0, tx = 0, ty = 0;
        function createTrail() { trail = document.createElement('div'); trail.className = 'cursor-trail'; document.body.appendChild(trail); animate(); }
        function animate() { if (!trail) return; tx += (mx - tx) * 0.25; ty += (my - ty) * 0.25; trail.style.left = tx + 'px'; trail.style.top = ty + 'px'; requestAnimationFrame(animate); }
        document.addEventListener('mousemove', (e) => { mx = e.clientX; my = e.clientY; if (!trail) createTrail(); });

        const discordStat = document.getElementById('discordStatus');
        if (discordStat) {
            discordStat.style.cursor = 'crosshair';
            discordStat.addEventListener('click', () => {
                navigator.clipboard.writeText(DISCORD_ID);
                const toast = document.getElementById('toast');
                toast.textContent = 'Copied Discord ID';
                toast.classList.add('show');
                setTimeout(() => toast.classList.remove('show'), 1500);
                playClick();
            });
        }

        document.getElementById('discordLink').addEventListener('click', (e) => { e.preventDefault(); playClick(); window.open(MY_LINKS.discord, '_blank'); });
        document.getElementById('spotifyProfileLink').addEventListener('click', (e) => { e.preventDefault(); playClick(); window.open(MY_LINKS.spotifyProfile, '_blank'); });
        document.getElementById('burgerAvatar').addEventListener('click', () => alert("🎧 killez · PKCE OAuth\n• Real Spotify Now Playing\n• Fully transparent UI"));

        console.log("✅ PKCE OAuth flow ready | response_type=code | Redirect URI must match exactly");
    })();
</script>
</body>
</html>
