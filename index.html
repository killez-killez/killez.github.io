<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>killez.io | JACK STAUBER</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #0a0000;
  --card: #0f0505;
  --border: #ff222240;
  --accent: #cc0000;
  --accent2: #ff1a1a;
  --accent3: #990000;
  --text: #f5e6e6;
  --muted: #b88686;
  --btn-bg: #180808;
  --btn-hover: #2a1010;
}

html {
  height: 100%;
  overflow: hidden;
}

body {
  font-family: 'Syne', sans-serif;
  background: #0a0000 radial-gradient(circle at 20% 30%, #2a0505 0%, #050000 95%);
  color: var(--text);
  height: 100vh;
  height: 100dvh;
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 1rem;
  overflow: hidden;
  perspective: 1200px;
}

body.is-desktop,
body.is-desktop a,
body.is-desktop button { cursor: none !important; }

/* Rain Canvas Background - Dark Red */
#rain-canvas {
  position: fixed;
  inset: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  z-index: 0;
  opacity: 0.7;
}

.bg-orb { position: fixed; border-radius: 50%; pointer-events: none; z-index: 0; filter: blur(10px); animation: pulseGlow 3s ease-in-out infinite; }
.orb1 { width: 620px; height: 620px; top: -220px; left: -160px; background: radial-gradient(circle, #cc000015 0%, transparent 68%); animation-delay: 0s; }
.orb2 { width: 520px; height: 520px; bottom: -170px; right: -150px; background: radial-gradient(circle, #ff1a1a15 0%, transparent 65%); animation-delay: 1s; }
.orb3 { width: 320px; height: 320px; top: 36%; left: 58%; background: radial-gradient(circle, #99000010 0%, transparent 70%); animation-delay: 2s; }

@keyframes pulseGlow {
  0%, 100% { opacity: 0.4; transform: scale(1); }
  50% { opacity: 0.6; transform: scale(1.08); }
}

#enter-screen {
  position: fixed; inset: 0; z-index: 100;
  background: radial-gradient(circle at center, #0f0303 0%, #050000 100%);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 1.5rem;
  transition: opacity 0.8s ease, visibility 0.8s ease;
}
#enter-screen.hidden { opacity: 0; visibility: hidden; }

.enter-logo {
  font-family: 'Syne', sans-serif;
  font-size: 4rem; font-weight: 800; letter-spacing: 0.08em;
  background: linear-gradient(135deg, #cc0000, #ff1a1a, #ff6666, #cc0000);
  background-size: 300% 300%;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  animation: epulse 2s ease-in-out infinite, gradientShift 3s ease infinite;
}
@keyframes gradientShift {
  0%, 100% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
}
@keyframes epulse {
  0%, 100% { transform: translateY(0); filter: drop-shadow(0 0 10px #cc000066); }
  50% { transform: translateY(-4px); filter: drop-shadow(0 0 25px #cc0000cc); }
}

.enter-btn {
  background: linear-gradient(135deg, #150505, #200a0a);
  border: 2px solid #cc0000;
  border-radius: 99px;
  padding: 14px 44px;
  color: var(--text);
  font-family: 'Syne', sans-serif;
  font-weight: 700;
  font-size: 1rem;
  letter-spacing: 0.1em;
  transition: all 0.3s;
  cursor: pointer;
}
.enter-btn:hover {
  border-color: #ff1a1a;
  transform: scale(1.05);
  box-shadow: 0 0 28px #cc000050;
  background: linear-gradient(135deg, #250a0a, #301010);
}

.enter-sub {
  font-family: 'DM Mono', monospace;
  font-size: 0.7rem;
  color: #ff3333;
  letter-spacing: 0.1em;
  animation: blink 1.5s step-end infinite, textGlow 2s ease-in-out infinite;
}
@keyframes textGlow {
  0%, 100% { text-shadow: 0 0 5px #cc0000; }
  50% { text-shadow: 0 0 12px #ff1a1a; }
}
@keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

#tilt-wrapper {
  position: relative; z-index: 1;
  width: 100%; max-width: 580px;
  transform-style: preserve-3d;
  transform: rotateX(0deg) rotateY(0deg);
  transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1);
  opacity: 0;
}
#tilt-wrapper.visible {
  opacity: 1;
  transition: opacity 0.8s ease, transform 0.6s cubic-bezier(0.23, 1, 0.32, 1);
}
#tilt-wrapper.tilting { transition: transform 0.08s linear; }

.card {
  background:
    linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0) 22%),
    linear-gradient(160deg, #140808 0%, #0d0505 46%, #080202 100%);
  border: 1px solid #cc000028;
  border-radius: 32px;
  padding: 2.4rem 2.6rem;
  text-align: center;
  position: relative;
  transform-style: preserve-3d;
  box-shadow: 0 24px 70px #00000090, 0 0 0 1px #cc000015 inset;
  transition: box-shadow 0.4s ease;
  overflow: visible;
}

@media (max-width: 480px) {
  .card { padding: 1.5rem 1.2rem; border-radius: 24px; }
  .avatar-burger { width: 85px; height: 85px; }
  .username { font-size: 1.4rem; }
  .sp-art { width: 36px; height: 36px; }
  .icon-btn { width: 52px; height: 52px; }
}

.card.glow {
  box-shadow: 0 0 55px #cc000024, 0 0 100px #ff1a1a1a, 0 20px 70px #00000080;
}

.card-depth { position: absolute; inset: 0; border-radius: 32px; transform: translateZ(-8px) scale(1.02); border: 1px solid #cc000016; pointer-events: none; }
.card-depth2 { position: absolute; inset: 0; border-radius: 32px; transform: translateZ(-16px) scale(1.04); border: 1px solid #ff333312; pointer-events: none; }

.volume-ctrl {
  position: fixed;
  top: 20px; right: 24px;
  display: flex; align-items: center; gap: 7px;
  z-index: 200;
  background: #0f0303d9;
  border: 1px solid #ff222240;
  border-radius: 99px;
  padding: 7px 14px;
  backdrop-filter: blur(12px);
}
@media (max-width: 480px) {
  .volume-ctrl { top: 12px; right: 12px; padding: 5px 10px; }
}

.vol-icon svg { display: block; }
.vol-slider {
  -webkit-appearance: none;
  appearance: none;
  width: 72px; height: 3px;
  border-radius: 99px;
  background: linear-gradient(to right, #cc0000 var(--val, 80%), #ffffff18 var(--val, 80%));
  outline: none;
}
.vol-slider::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 14px; height: 14px;
  border-radius: 50%;
  background: #cc0000;
  box-shadow: 0 0 8px #cc000070;
}

/* JACK STAUBER BURGER AVATAR - Custom SVG Burger */
.avatar-section {
  position: relative;
  display: flex;
  justify-content: center;
  margin-bottom: 1.2rem;
  transform: translateZ(25px);
}
.avatar-wrapper {
  position: relative;
  width: fit-content;
}
.avatar-frame {
  position: absolute;
  inset: -4px;
  border-radius: 50%;
  background: linear-gradient(135deg, #cc0000, #ff1a1a, #ff4444);
  opacity: 0.8;
  filter: blur(2px);
  animation: framePulse 2s ease-in-out infinite;
}
@keyframes framePulse {
  0%, 100% { opacity: 0.6; transform: scale(1); }
  50% { opacity: 1; transform: scale(1.02); }
}
.avatar-burger {
  position: relative;
  width: 96px;
  height: 96px;
  border-radius: 50%;
  background: #2a1508;
  border: 3px solid #cc0000;
  box-shadow: 0 0 30px #cc000080;
  transition: all 0.3s ease;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  cursor: pointer;
}
.avatar-burger:hover {
  transform: scale(1.02);
  box-shadow: 0 0 45px #cc0000cc;
}
.burger-svg {
  width: 70px;
  height: 70px;
  filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
}
.avatar-glow-ring {
  position: absolute;
  top: 50%;
  left: 50%;
  width: 110%;
  height: 110%;
  transform: translate(-50%, -50%);
  border-radius: 50%;
  background: radial-gradient(circle, rgba(204,0,0,0.2) 0%, transparent 70%);
  pointer-events: none;
  animation: ringRotate 4s linear infinite;
}
@keyframes ringRotate {
  0% { transform: translate(-50%, -50%) rotate(0deg); }
  100% { transform: translate(-50%, -50%) rotate(360deg); }
}
.status-dot {
  position: absolute;
  bottom: 6px;
  right: 6px;
  width: 18px;
  height: 18px;
  border-radius: 50%;
  background: linear-gradient(135deg, #ff1a1a, #cc0000);
  border: 2px solid #0f0505;
  box-shadow: 0 0 15px #cc0000;
  animation: statusPulse 1.5s ease-in-out infinite;
  z-index: 2;
}
@keyframes statusPulse {
  0%, 100% { transform: scale(1); box-shadow: 0 0 8px #cc0000; }
  50% { transform: scale(1.15); box-shadow: 0 0 20px #ff1a1a; }
}
.avatar-decor {
  position: absolute;
  top: -15px;
  right: -15px;
  font-size: 1.8rem;
  filter: drop-shadow(0 0 5px #cc0000);
  animation: floatDecor 3s ease-in-out infinite;
}
@keyframes floatDecor {
  0%, 100% { transform: translateY(0px) rotate(0deg); }
  50% { transform: translateY(-5px) rotate(5deg); }
}
@media (max-width: 480px) {
  .avatar-burger { width: 80px; height: 80px; }
  .burger-svg { width: 58px; height: 58px; }
  .avatar-decor { font-size: 1.4rem; top: -12px; right: -12px; }
  .status-dot { width: 16px; height: 16px; bottom: 4px; right: 4px; }
}

.username {
  font-size: 1.8rem; font-weight: 800;
  background: linear-gradient(135deg, #cc0000, #ff1a1a, #ff6666);
  background-size: 200% 200%;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-bottom: 0.25rem;
  animation: usernameGradient 3s ease infinite;
}
@keyframes usernameGradient {
  0%, 100% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
}
.username .name-cursor {
  display: inline-block; width: 2px; height: 1em;
  background: #cc0000;
  margin-left: 2px; vertical-align: middle;
  animation: blink 0.8s step-end infinite;
}

.handle { font-family: 'DM Mono', monospace; font-size: 0.75rem; color: var(--muted); margin-bottom: 0.9rem; }

.bio {
  font-size: 1rem; font-weight: 600; line-height: 1.6;
  margin-bottom: 1.2rem;
  background: linear-gradient(90deg, #cc0000, #ff1a1a, #ff6666, #cc0000);
  background-size: 220% auto;
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
  animation: gradshift 4s linear infinite;
}
@keyframes gradshift {
  0% { background-position: 0% center; }
  100% { background-position: 220% center; }
}
.bio .cursor {
  display: inline-block; width: 2px; height: 1em;
  background: #cc0000 !important;
  margin-left: 2px; vertical-align: middle;
  animation: blink 0.8s step-end infinite;
  -webkit-text-fill-color: initial;
}

.badges { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; margin-bottom: 1.2rem; }
.badge {
  font-family: 'DM Mono', monospace; font-size: 0.65rem;
  padding: 4px 12px; border-radius: 99px;
  border: 1px solid #ff222228; color: var(--muted); background: var(--btn-bg);
  transition: all 0.3s;
}
.badge:hover {
  border-color: #cc0000;
  transform: scale(1.03);
  box-shadow: 0 0 8px #cc000040;
}
.badge.special {
  border-color: #ff666640; color: #ffaaaa;
  background: linear-gradient(135deg, #cc000010, #ff1a1a0d);
}

.divider { height: 1px; background: linear-gradient(90deg, transparent, #ff222235, transparent); margin: 1rem 0; }

.spotify-bar {
  background: #080202;
  border: 1px solid #ff222232;
  border-radius: 18px; padding: 12px 14px; margin-bottom: 1rem;
  display: flex; align-items: center; gap: 12px;
  position: relative;
  overflow: hidden;
}
.spotify-bar::before {
  content: "";
  position: absolute;
  inset: -2px;
  background: linear-gradient(45deg, #cc0000, #ff1a1a, #cc0000);
  border-radius: 19px;
  opacity: 0;
  z-index: -1;
  transition: opacity 0.3s;
}
.spotify-bar:hover::before { opacity: 0.25; }

.sp-art {
  width: 44px; height: 44px; border-radius: 12px;
  background: linear-gradient(135deg, #1a0808, #110505);
  border: 1px solid #ff222222;
  display: flex; align-items: center; justify-content: center;
  font-size: 20px;
  overflow: hidden;
}
.sp-art img {
  width: 100%; height: 100%; object-fit: cover;
  border-radius: 12px; display: none;
}
.sp-art img.loaded { display: block; }
.sp-art img.loaded + .sp-art-emoji { display: none; }

.sp-info { flex: 1; text-align: left; overflow: hidden; }
.sp-title { font-size: 0.85rem; font-weight: 700; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.sp-artist { font-family: 'DM Mono', monospace; font-size: 0.68rem; color: var(--muted); }
.sp-label { font-family: 'DM Mono', monospace; font-size: 0.6rem; color: #ff5555; margin-bottom: 3px; display: flex; align-items: center; gap: 5px; }
.sp-dot { width: 5px; height: 5px; border-radius: 50%; background: #cc0000; animation: spdot 1.5s ease infinite; }
@keyframes spdot { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; transform: scale(0.6); } }

.sp-progress-wrap {
  margin-top: 8px;
  display: flex; align-items: center; gap: 6px;
}
.sp-time {
  font-family: 'DM Mono', monospace;
  font-size: 0.55rem; color: var(--muted);
  width: 28px;
}
.sp-progress {
  flex: 1; height: 5px; background: #ffffff15;
  border-radius: 99px; position: relative;
  cursor: pointer;
}
.sp-progress-inner {
  position: relative; width: 100%; height: 100%;
  border-radius: 99px; overflow: hidden;
}
.sp-fill {
  height: 100%;
  background: linear-gradient(90deg, #cc0000, #ff1a1a);
  width: 0%;
  transition: width 0.3s linear;
}
.sp-thumb {
  position: absolute; top: 50%; right: -6px;
  width: 11px; height: 11px; border-radius: 50%;
  background: #ff6666;
  transform: translateY(-50%) scale(0);
  transition: transform 0.15s ease;
  pointer-events: none;
}
.sp-progress:hover .sp-thumb,
.sp-progress.dragging .sp-thumb { transform: translateY(-50%) scale(1); }

.sp-controls { display: flex; align-items: center; gap: 8px; }
.sp-btn {
  background: transparent; border: none;
  color: var(--muted);
  padding: 5px;
  transition: color 0.2s, transform 0.15s;
  cursor: pointer;
}
.sp-btn:hover { color: var(--text); transform: scale(1.12); }
.sp-btn.play {
  width: 36px; height: 36px; border-radius: 50%;
  background: linear-gradient(135deg, #cc0000, #ff1a1a);
  color: #fff;
  padding: 0;
  animation: buttonPulse 2s ease-in-out infinite;
}
@keyframes buttonPulse {
  0%, 100% { box-shadow: 0 0 0 0 rgba(204, 0, 0, 0.6); }
  50% { box-shadow: 0 0 0 8px rgba(204, 0, 0, 0); }
}
.sp-btn.play:hover { background: linear-gradient(135deg, #ff1a1a, #ff4444); transform: scale(1.08); }

.links {
  display: flex;
  justify-content: center;
  gap: 16px;
  padding-top: 8px;
}
.icon-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 56px;
  height: 56px;
  border-radius: 18px;
  background: var(--btn-bg);
  border: 1px solid #ff222222;
  color: var(--muted);
  text-decoration: none;
  transition: all 0.3s;
}
.icon-btn svg {
  width: 26px;
  height: 26px;
  display: block;
  fill: currentColor;
}
.icon-btn:hover {
  background: var(--btn-hover);
  border-color: #ff444466;
  transform: translateY(-3px) scale(1.05);
  box-shadow: 0 6px 20px #cc000025;
}
.discord-btn:hover { color: #5865F2; }
.spotify-btn:hover { color: #1DB954; }

.views {
  font-family: 'DM Mono', monospace;
  font-size: 0.65rem;
  color: var(--muted);
  margin-top: 1rem;
  opacity: 0.4;
  letter-spacing: 1px;
}

/* Cursor */
#cursor-dot, #cursor-ring { display: none; }
body.is-desktop #cursor-dot,
body.is-desktop #cursor-ring { display: block; }
#cursor-dot {
  position: fixed; width: 8px; height: 8px; border-radius: 50%;
  background: #cc0000; pointer-events: none; z-index: 99999;
  transform: translate(-50%, -50%);
  box-shadow: 0 0 12px #cc0000;
}
#cursor-ring {
  position: fixed; width: 34px; height: 34px; border-radius: 50%;
  border: 1.5px solid #ff444480; pointer-events: none; z-index: 99998;
  transform: translate(-50%, -50%);
  transition: width 0.2s, height 0.2s;
}
.trail-dot {
  position: fixed; border-radius: 50%;
  pointer-events: none; z-index: 99990;
  transform: translate(-50%, -50%);
  display: none;
}
body.is-desktop .trail-dot { display: block; }

.spark {
  position: fixed; pointer-events: none;
  z-index: 99995; width: 5px; height: 5px; border-radius: 50%;
  animation: spark-fly 0.6s ease forwards;
}
@keyframes spark-fly {
  0% { opacity: 1; transform: translate(0,0) scale(1); }
  100% { opacity: 0; transform: var(--tx) scale(0); }
}
</style>
</head>
<body>

<canvas id="rain-canvas"></canvas>

<div id="cursor-dot"></div>
<div id="cursor-ring"></div>

<div class="bg-orb orb1"></div>
<div class="bg-orb orb2"></div>
<div class="bg-orb orb3"></div>

<div id="enter-screen">
  <div class="enter-logo">KILLEZ</div>
  <button class="enter-btn" id="enter-btn">ENTER</button>
  <p class="enter-sub">JACK STAUBER MICROPOP</p>
</div>

<div class="volume-ctrl">
  <span class="vol-icon" id="vol-icon">
    <svg id="vol-svg" width="16" height="16" viewBox="0 0 24 24" fill="white">
      <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>
    </svg>
  </span>
  <input type="range" class="vol-slider" id="vol-slider" min="0" max="100" value="80" style="--val: 80%;"/>
</div>

<div id="tilt-wrapper">
  <div class="card" id="card">
    <div class="card-depth"></div>
    <div class="card-depth2"></div>

    <!-- JACK STAUBER BURGER AVATAR -->
    <div class="avatar-section">
      <div class="avatar-wrapper">
        <div class="avatar-frame"></div>
        <div class="avatar-glow-ring"></div>
        <div class="avatar-burger" id="burger-avatar">
          <svg class="burger-svg" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
            <!-- Top Bun -->
            <ellipse cx="50" cy="30" rx="35" ry="18" fill="#D4A054" stroke="#B87333" stroke-width="2"/>
            <ellipse cx="50" cy="28" rx="30" ry="12" fill="#E8B870" opacity="0.6"/>
            <!-- Lettuce -->
            <path d="M18 45 Q30 38 50 42 Q70 38 82 45" stroke="#5A9E4E" stroke-width="4" fill="none"/>
            <path d="M20 48 Q35 42 50 46 Q65 42 80 48" stroke="#6BAF5E" stroke-width="3" fill="none"/>
            <!-- Cheese -->
            <rect x="22" y="48" width="56" height="6" rx="2" fill="#FFB347"/>
            <!-- Patty -->
            <ellipse cx="50" cy="58" rx="34" ry="12" fill="#8B3A3A"/>
            <ellipse cx="50" cy="56" rx="30" ry="8" fill="#A0522D"/>
            <!-- Bottom Bun -->
            <ellipse cx="50" cy="72" rx="33" ry="10" fill="#C4924A"/>
            <ellipse cx="50" cy="70" rx="28" ry="6" fill="#D4A054"/>
            <!-- Sesame Seeds -->
            <circle cx="35" cy="24" r="2" fill="#FFF8DC"/>
            <circle cx="55" cy="22" r="2" fill="#FFF8DC"/>
            <circle cx="42" cy="20" r="1.5" fill="#FFF8DC"/>
            <circle cx="65" cy="26" r="1.8" fill="#FFF8DC"/>
            <circle cx="28" cy="28" r="1.5" fill="#FFF8DC"/>
            <!-- Eyes (cute) -->
            <circle cx="40" cy="35" r="3" fill="#2C1810"/>
            <circle cx="60" cy="35" r="3" fill="#2C1810"/>
            <circle cx="41" cy="34" r="1" fill="white"/>
            <circle cx="61" cy="34" r="1" fill="white"/>
            <!-- Smile -->
            <path d="M44 42 Q50 48 56 42" stroke="#2C1810" stroke-width="1.5" fill="none" stroke-linecap="round"/>
          </svg>
        </div>
        <div class="status-dot"></div>
        <div class="avatar-decor">🍔</div>
      </div>
    </div>

    <span class="username" id="username"><span class="name-cursor"></span></span>
    <p class="handle">@killez</p>
    <p class="bio" id="bio"><span class="cursor"></span></p>

    <div class="badges">
      <span class="badge">MICROPOP</span>
      <span class="badge special">BURGER BOY</span>
      <span class="badge">KILLEZ</span>
    </div>

    <div class="divider"></div>

    <div class="spotify-bar">
      <div class="sp-art" id="sp-art">
        <img id="sp-art-img" src="" alt=""/>
        <span class="sp-art-emoji" id="sp-art-emoji">🎵</span>
      </div>
      <div class="sp-info">
        <div class="sp-label"><span class="sp-dot"></span><span id="sp-status">micropop</span></div>

    <div class="links">

<audio id="audio" loop></audio>

<script>
// Rain Effect
const canvas = document.getElementById('rain-canvas');
const ctx = canvas.getContext('2d');
let width, height;
let raindrops = [];
const RAIN_COUNT = 200;

function resizeCanvas() {
  width = canvas.width = window.innerWidth;
  height = canvas.height = window.innerHeight;
}

function initRain() {
  raindrops = [];
  for (let i = 0; i < RAIN_COUNT; i++) {
    raindrops.push({
      x: Math.random() * width,
      y: Math.random() * height,
      length: Math.random() * 22 + 8,
      speed: Math.random() * 9 + 4,
      opacity: Math.random() * 0.5 + 0.2
    });
  }
}

function drawRain() {
  ctx.clearRect(0, 0, width, height);
  for (let drop of raindrops) {
    ctx.beginPath();
    ctx.moveTo(drop.x, drop.y);
    ctx.lineTo(drop.x, drop.y + drop.length);
    ctx.strokeStyle = `rgba(200, 40, 40, ${drop.opacity})`;
    ctx.lineWidth = 1.8;
    ctx.stroke();
    drop.y += drop.speed;
    if (drop.y > height) {
      drop.y = -drop.length;
      drop.x = Math.random() * width;
    }
  }
  requestAnimationFrame(drawRain);
}

window.addEventListener('resize', () => {
  resizeCanvas();
  initRain();
});
resizeCanvas();
initRain();
drawRain();

// JACK STAUBER MICROPOP PLAYLIST
const JACK_STAUBER_SONGS = [
  { title: "BUTTERCUP", artist: "Jack Stauber", duration: 186, src: "https://cdn.pixabay.com/download/audio/2022/03/24/audio_8c4f1b6f5b.mp3", emoji: "🧈" },
  { title: "OH KLOPPENPOP", artist: "Jack Stauber", duration: 156, src: "https://cdn.pixabay.com/download/audio/2022/01/18/audio_d3e5f2b1a8.mp3", emoji: "🎹" },
  { title: "TWO TIME", artist: "Jack Stauber", duration: 168, src: "https://cdn.pixabay.com/download/audio/2022/05/27/audio_9f2e8c4d1a.mp3", emoji: "⏰" },
  { title: "FIGHTER", artist: "Jack Stauber", duration: 142, src: "https://cdn.pixabay.com/download/audio/2022/04/01/audio_7b3d2f1e6c.mp3", emoji: "🥊" },
  { title: "PLEASE DON'T WAKE ME UP", artist: "Jack Stauber", duration: 172, src: "https://cdn.pixabay.com/download/audio/2022/06/15/audio_4e8f2a1d7b.mp3", emoji: "😴" }
];

let currentTrack = 0;
let isPlaying = false;
let audioElement = null;
let progressInterval = null;

audioElement = new Audio();
audioElement.volume = 0.8;

function loadTrack(index) {
  const track = JACK_STAUBER_SONGS[index];
  audioElement.src = track.src;
  document.getElementById('sp-title').textContent = track.title;
  document.getElementById('sp-artist').textContent = track.artist;
  document.getElementById('sp-art-emoji').textContent = track.emoji;
  document.getElementById('sp-time-dur').textContent = formatTime(track.duration);
  document.getElementById('sp-fill').style.width = '0%';
  document.getElementById('sp-time-cur').textContent = '0:00';
}

function formatTime(seconds) {
  const mins = Math.floor(seconds / 60);
  const secs = Math.floor(seconds % 60);
  return `${mins}:${secs.toString().padStart(2, '0')}`;
}

function updateProgress() {
  if (audioElement && !isNaN(audioElement.duration) && audioElement.duration > 0) {
    const percent = (audioElement.currentTime / audioElement.duration) * 100;
    document.getElementById('sp-fill').style.width = percent + '%';
    document.getElementById('sp-time-cur').textContent = formatTime(audioElement.currentTime);
  }
}

function startProgressTimer() {
  if (progressInterval) clearInterval(progressInterval);
  progressInterval = setInterval(() => {
    if (isPlaying && audioElement && !audioElement.paused) {
      updateProgress();
    }
  }, 200);
}

function playTrack() {
  audioElement.play().catch(e => console.log("Play error:", e));
  isPlaying = true;
  document.getElementById('sp-status').textContent = 'NOW PLAYING';
  document.getElementById('card').classList.add('glow');
  document.getElementById('play-icon').innerHTML = '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>';
  startProgressTimer();
}

function pauseTrack() {
  audioElement.pause();
  isPlaying = false;
  document.getElementById('sp-status').textContent = 'PAUSED';
  document.getElementById('card').classList.remove('glow');
  document.getElementById('play-icon').innerHTML = '<path d="M8 5v14l11-7z"/>';
}

function nextTrack() {
  currentTrack = (currentTrack + 1) % JACK_STAUBER_SONGS.length;
  loadTrack(currentTrack);
  if (isPlaying) {
    playTrack();
  } else {
    audioElement.pause();
  }
}

function prevTrack() {
  currentTrack = (currentTrack - 1 + JACK_STAUBER_SONGS.length) % JACK_STAUBER_SONGS.length;
  loadTrack(currentTrack);
  if (isPlaying) {
    playTrack();
  } else {
    audioElement.pause();
  }
}

audioElement.addEventListener('ended', () => { nextTrack(); });
audioElement.addEventListener('loadedmetadata', () => {
  if (audioElement.duration && !isNaN(audioElement.duration)) {
    document.getElementById('sp-time-dur').textContent = formatTime(audioElement.duration);
  }
});

document.getElementById('sp-play').addEventListener('click', () => {
  if (isPlaying) { pauseTrack(); } else { playTrack(); }
});
document.getElementById('sp-next').addEventListener('click', () => { nextTrack(); });
document.getElementById('sp-prev').addEventListener('click', () => { prevTrack(); });

const volSlider = document.getElementById('vol-slider');
volSlider.addEventListener('input', (e) => {
  const val = e.target.value / 100;
  audioElement.volume = val;
  volSlider.style.setProperty('--val', e.target.value + '%');
});

const spProg = document.getElementById('sp-progress');
let isSeeking = false;
function seekTo(clientX) {
  const rect = spProg.getBoundingClientRect();
  let pct = (clientX - rect.left) / rect.width;
  pct = Math.max(0, Math.min(1, pct));
  if (audioElement.duration && !isNaN(audioElement.duration)) {
    audioElement.currentTime = pct * audioElement.duration;
    updateProgress();
  }
}
spProg.addEventListener('mousedown', (e) => { isSeeking = true; spProg.classList.add('dragging'); seekTo(e.clientX); });
window.addEventListener('mousemove', (e) => { if (isSeeking) seekTo(e.clientX); });
window.addEventListener('mouseup', () => { isSeeking = false; spProg.classList.remove('dragging'); });
spProg.addEventListener('touchstart', (e) => { isSeeking = true; spProg.classList.add('dragging'); seekTo(e.touches[0].clientX); e.preventDefault(); }, { passive: false });
window.addEventListener('touchmove', (e) => { if (isSeeking) { seekTo(e.touches[0].clientX); e.preventDefault(); } }, { passive: false });
window.addEventListener('touchend', () => { isSeeking = false; spProg.classList.remove('dragging'); });

// Typing animations
const usernameEl = document.getElementById('username');
const NAME = 'killez';
function typeUsername() {
  const cursor = usernameEl.querySelector('.name-cursor') || (() => { const c = document.createElement('span'); c.className = 'name-cursor'; return c; })();
  let i = 0;
  function typeIn() {
    if (i <= NAME.length) { usernameEl.textContent = NAME.slice(0, i); usernameEl.appendChild(cursor); i++; setTimeout(typeIn, 110); }
    else setTimeout(deleteOut, 1600);
  }
  function deleteOut() {
    const cur = usernameEl.textContent.replace('|', '').length;
    if (cur > 0) { usernameEl.textContent = NAME.slice(0, cur - 1); usernameEl.appendChild(cursor); setTimeout(deleteOut, 60); }
    else { i = 0; setTimeout(typeIn, 400); }
  }
  typeIn();
}

const BIO_PHRASES = ['JACK STAUBER MICROPOP', 'BUTTERCUP ON REPEAT', 'BURGER TIME', 'FIGHTER MODE'];
const bioEl = document.getElementById('bio');
let phraseIndex = 0;
const bioText = document.createElement('span');
bioText.id = 'bio-text';
bioEl.insertBefore(bioText, bioEl.querySelector('.cursor'));
function typeBio() {
  const line = BIO_PHRASES[phraseIndex];
  if (bioText.textContent.length < line.length) { bioText.textContent += line[bioText.textContent.length]; setTimeout(typeBio, 55); }
  else setTimeout(deleteBio, 1800);
}
function deleteBio() {
  if (bioText.textContent.length > 0) { bioText.textContent = bioText.textContent.slice(0, -1); setTimeout(deleteBio, 30); }
  else { phraseIndex = (phraseIndex + 1) % BIO_PHRASES.length; setTimeout(typeBio, 400); }
}

document.getElementById('enter-btn').addEventListener('click', () => {
  const es = document.getElementById('enter-screen');
  es.classList.add('hidden');
  setTimeout(() => {
    es.style.display = 'none';
    document.getElementById('tilt-wrapper').classList.add('visible');
    typeUsername();
    setTimeout(typeBio, 700);
    loadTrack(0);
    playTrack();
  }, 800);
});

// Tilt effect
const wrapper = document.getElementById('tilt-wrapper');
const MAX_TILT = 16;
let isHovering = false;
function applyTilt(rx, ry) { wrapper.style.transform = `rotateX(${rx}deg) rotateY(${ry}deg)`; }
function resetTilt() { wrapper.classList.remove('tilting'); wrapper.style.transform = 'rotateX(0deg) rotateY(0deg)'; }
if (!isMobile) {
  wrapper.addEventListener('mouseenter', () => { isHovering = true; wrapper.classList.add('tilting'); });
  wrapper.addEventListener('mouseleave', () => { isHovering = false; resetTilt(); });
  wrapper.addEventListener('mousemove', (e) => {
    if (!isHovering) return;
    const rect = wrapper.getBoundingClientRect();
    const dx = (e.clientX - rect.left) / rect.width - 0.5;
    const dy = (e.clientY - rect.top) / rect.height - 0.5;
    applyTilt(-dy * MAX_TILT * 2, dx * MAX_TILT * 2);
  });
}

function spawnSparks(cx, cy) {
  for (let i = 0; i < 12; i++) {
    const s = document.createElement('div');
    s.className = 'spark';
    const angle = Math.random() * Math.PI * 2;
    const dist = 20 + Math.random() * 50;
    s.style.left = cx + 'px';
    s.style.top = cy + 'px';
    s.style.setProperty('--tx', `translate(${Math.cos(angle) * dist}px, ${Math.sin(angle) * dist}px)`);
    s.style.background = `hsl(${0 + Math.random() * 15}, 85%, 55%)`;
    document.body.appendChild(s);
    setTimeout(() => s.remove(), 600);
  }
}
document.addEventListener('click', (e) => spawnSparks(e.clientX, e.clientY));

const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
document.body.classList.add(isMobile ? 'is-mobile' : 'is-desktop');
if (!isMobile) {
  const dot = document.getElementById('cursor-dot');
  const ring = document.getElementById('cursor-ring');
  let mx = window.innerWidth / 2, my = window.innerHeight / 2;
  let rx = mx, ry = my;
  document.addEventListener('mousemove', (e) => {
    mx = e.clientX; my = e.clientY;
    dot.style.left = mx + 'px';
    dot.style.top = my + 'px';
  });
  function animateRing() {
    rx += (mx - rx) * 0.15;
    ry += (my - ry) * 0.15;
    ring.style.left = rx + 'px';
    ring.style.top = ry + 'px';
    requestAnimationFrame(animateRing);
  }
  animateRing();
  document.querySelectorAll('a, button, .icon-btn, .sp-progress, .vol-slider').forEach(el => {
    el.addEventListener('mouseenter', () => {
      dot.style.width = '5px';
      dot.style.height = '5px';
      ring.style.width = '48px';
      ring.style.height = '48px';
      ring.style.borderColor = '#ff3333';
    });
    el.addEventListener('mouseleave', () => {
      dot.style.width = '8px';
      dot.style.height = '8px';
      ring.style.width = '34px';
      ring.style.height = '34px';
      ring.style.borderColor = '#ff444480';
    });
  });
}
</script>
